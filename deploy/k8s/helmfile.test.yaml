# deploy/k8s/helmfile.test.yaml
repositories:
  - name: cnpg
    url: https://cloudnative-pg.github.io/charts
  - name: emqx
    url: https://repos.emqx.io/charts

---

releases:
  # ============================================================================
  # 1. CloudNativePG operator — must be fully installed before postgres release.
  #    Run once manually first if using helmfile diff:
  #      helmfile apply -f helmfile.test.yaml -l name=cnpg-operator
  # ============================================================================
  - name: cnpg-operator
    chart: cnpg/cloudnative-pg
    version: "0.27.1"
    namespace: edge-core
    createNamespace: true

  # ============================================================================
  # 2a. PostgreSQL — edge-admin (single instance for local testing)
  #     disableValidation: skips CRD schema check so it does not fail before
  #     cnpg-operator has had a chance to install the CRD.
  # ============================================================================
  - name: edge-admin-db
    chart: ./charts/postgres
    namespace: edge-core
    disableValidation: true
    needs:
      - cnpg-operator
    values:
      - values/test/edge-admin-db.yaml

  # ============================================================================
  # 2b. PostgreSQL — edge-vpn (single instance for local testing)
  # ============================================================================
  - name: edge-vpn-db
    chart: ./charts/postgres
    namespace: edge-core
    disableValidation: true
    needs:
      - cnpg-operator
    values:
      - values/test/edge-vpn-db.yaml

  # ============================================================================
  # 3. EMQX — single node
  # ============================================================================
  - name: edge-vpn-broker
    chart: ./charts/edge-vpn-broker
    namespace: edge-core
    needs:
      - cnpg-operator
    values:
      - emqx:
          emqxConfig:
            EMQX_DASHBOARD__DEFAULT_PASSWORD: "edge_vpn123"
            EMQX_NODE__COOKIE: "test-cookie"
          service:
            type: NodePort
            nodePorts:
              dashboard: 30085
              ws: 30083
          persistence:
            size: 128Mi
            storageClassName: "standard"

  # ============================================================================
  # 4. Edge VPN (VPN server + Edge VPN DNS sidecar) — single replica
  # ============================================================================
  - name: edge-vpn
    chart: ./charts/edge-vpn
    namespace: edge-core
    needs:
      - edge-vpn-db
      - edge-vpn-broker
    values:
      - values/test/edge-vpn.yaml

  # ============================================================================
  # 4b. Caddy — reverse proxy giving Netmaker a real hostname.
  #     edge-vpn.localtest.me → edge-vpn:8081
  #     edge-vpn-broker.localtest.me → edge-vpn-broker:8083
  #     Exposed on host port 80 via kind (localtest.me → 127.0.0.1 on host).
  #     Admin pods use hostAliases to reach Caddy by hostname via /etc/hosts,
  #     bypassing netclient's DNS entirely.
  # ============================================================================
  - name: caddy
    chart: ./charts/caddy
    namespace: edge-core
    needs:
      - edge-vpn
    values:
      - nodePort:
          enabled: true
          port: 30088

  # ============================================================================
  # 5a. Edge Admin — cluster A (single pod)
  # ============================================================================
  - name: edge-admin-a
    chart: ./charts/edge-admin
    namespace: edge-core
    needs:
      - edge-admin-db
      - edge-vpn
      - caddy
    values:
      - values/test/edge-admin.yaml
      - config:
          adminClusterName: "a"
          adminClusterSubnet: "100.63.0.0/24"
          metricsBaseUrl: "edge-admin-a:44000"
        secrets:
          vpnClusterCookie: "test-cookie-a"
        nodePort:
          enabled: true
          apiPort: 30000
          httpProxyPort: 30100
          socks5Port: 30101

  # ============================================================================
  # 5b. Edge Admin — cluster B (single pod)
  # ============================================================================
  - name: edge-admin-b
    chart: ./charts/edge-admin
    namespace: edge-core
    needs:
      - edge-admin-db
      - edge-vpn
      - caddy
    values:
      - values/test/edge-admin.yaml
      - config:
          adminClusterName: "b"
          adminClusterSubnet: "100.63.1.0/24"
          metricsBaseUrl: "edge-admin-b:44000"
        secrets:
          vpnClusterCookie: "test-cookie-b"
        nodePort:
          enabled: true
          apiPort: 30002
          httpProxyPort: 30102
          socks5Port: 30103

  # ============================================================================
  # 6. Edge Admin Proxy — NodePort matching kind-config.yaml port mappings
  # ============================================================================
  - name: edge-admin-proxy
    chart: ./charts/edge-admin-proxy
    namespace: edge-core
    needs:
      - edge-admin-a
      - edge-admin-b
    values:
      - coreLabel: "edge-core"
        type: NodePort
        nodePorts:
          httpProxy: 30128
          socks5Proxy: 30080
