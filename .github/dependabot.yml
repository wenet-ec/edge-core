# .github/dependabot.yml
version: 2
updates:
  # Elixir/Phoenix dependencies for edge_admin
  - package-ecosystem: "mix"
    directory: "/edge_admin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "elixir"
      - "edge_admin"

  # Elixir/Phoenix dependencies for edge_agent
  - package-ecosystem: "mix"
    directory: "/edge_agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "elixir"
      - "edge_agent"

  # Elixir library dependencies for nexmaker
  - package-ecosystem: "mix"
    directory: "/nexmaker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "elixir"
      - "nexmaker"

  # Docker base images - edge_admin
  - package-ecosystem: "docker"
    directory: "/deploy/production/compose/edge_admin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "edge_admin"
    ignore:
      # We pin to exact patch versions (e.g. 1.19.5-otp-28-slim).
      # Dependabot incorrectly suggests floating tags like 1.19-otp-28-slim as "updates" — ignore them.
      - dependency-name: "elixir"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]

  # Docker base images - edge_agent
  - package-ecosystem: "docker"
    directory: "/deploy/production/compose/edge_agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "edge_agent"
    ignore:
      # Same as above — we manage Elixir base image upgrades manually.
      - dependency-name: "elixir"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]

  # Docker base images - edge_metrics_collector
  - package-ecosystem: "docker"
    directory: "/deploy/production/compose/edge_metrics_collector"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "metrics"

  # Docker base images - edge_vpn_broker
  - package-ecosystem: "docker"
    directory: "/deploy/production/compose/edge_vpn_broker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "vpn"

  # Docker base images - edge_relay
  - package-ecosystem: "docker"
    directory: "/deploy/production/compose/edge_relay"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "relay"

  # Docker base images - local edge_admin
  - package-ecosystem: "docker"
    directory: "/deploy/local/compose/edge_admin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "edge_admin"
    ignore:
      - dependency-name: "elixir"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]

  # Docker base images - local edge_agent
  - package-ecosystem: "docker"
    directory: "/deploy/local/compose/edge_agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "edge_agent"
    ignore:
      - dependency-name: "elixir"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"