# .github/workflows/edge_relay.yml
name: Edge Relay Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: v0.2.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            env.BUILDKIT_STEP_LOG_MAX_SIZE=10485760
            env.BUILDKIT_STEP_LOG_MAX_SPEED=10485760

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push edge_relay
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/production/compose/edge_relay/Dockerfile
          push: true
          tags: |
            ghcr.io/wenet-ec/edge_relay:${{ env.IMAGE_TAG }}
            ghcr.io/wenet-ec/edge_relay:latest
            ghcr.io/wenet-ec/edge_relay:stable
          platforms: linux/amd64,linux/arm64
          cache-from: |
            type=gha,scope=edge_relay-build
            type=registry,ref=ghcr.io/wenet-ec/edge_relay:cache
          cache-to: |
            type=gha,mode=max,scope=edge_relay-build
            type=registry,ref=ghcr.io/wenet-ec/edge_relay:cache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BUILDKIT_MULTI_PLATFORM=1
          provenance: false
          sbom: false

      - name: Output image info
        run: |
          echo "Built and pushed edge_relay:"
          echo "  ghcr.io/wenet-ec/edge_relay:${{ env.IMAGE_TAG }}"
          echo "  ghcr.io/wenet-ec/edge_relay:latest"
          echo "  ghcr.io/wenet-ec/edge_relay:stable"
