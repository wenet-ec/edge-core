# examples/event_brokers/config/mosquitto.conf
#
# Minimal Mosquitto config for Edge Core's event broker.
# Anonymous access is allowed at the network level (Docker network + firewall).
# For internet-exposed deployments, set `allow_anonymous false` and add a
# `password_file` and ACL rules.

listener 1883
protocol mqtt
allow_anonymous true

# Persistence — keep retained messages and queued QoS 1/2 across restart.
# Edge Core does not publish retained messages, but subscribers may rely on
# session state if they connect with `clean_session=false`.
persistence true
persistence_location /mosquitto/data/

# Logging to stdout (required for Docker)
log_dest stdout
log_type warning

# TLS — uncomment to expose a TLS listener on 8883.
# Mount certs first via the volumes section in mosquitto.yml.
# listener 8883
# protocol mqtt
# cafile   /mosquitto/tls/ca.crt
# certfile /mosquitto/tls/server.crt
# keyfile  /mosquitto/tls/server.key
# require_certificate false   # set to true for mTLS
