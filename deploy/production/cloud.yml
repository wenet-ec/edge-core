# deploy/production/cloud.yml
networks:
  production_edge_core:
    name: production_edge_core

volumes:
  production_edge_admin_db_data: {}
  production_edge_admin_db_data_backups: {}
  production_edge_vpn_data: {}
  production_edge_admin_tailscale_data: {}
  production_edge_metrics_storage_data: {}
  production_edge_metrics_collector_data: {}
  production_edge_metrics_collector_tailscale_data: {}

services:
  # Edge Admin
  edge_admin_db:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/postgres/Dockerfile
    image: production_edge_admin_db
    container_name: production_edge_admin_db
    networks:
      - production_edge_core
    volumes:
      - production_edge_admin_db_data:/var/lib/postgresql/data
      - production_edge_admin_db_data_backups:/backups
    env_file:
      - ./.envs/.edge_admin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  edge_admin:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
    image: production_edge_admin
    container_name: production_edge_admin
    networks:
      - production_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - production_edge_admin_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    command: /start

  # Edge VPN
  edge_vpn:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_vpn/Dockerfile
    image: production_edge_vpn
    container_name: production_edge_vpn
    volumes:
      - ../../deploy/production/compose/edge_vpn/headscale_config:/etc/headscale
      - production_edge_vpn_data:/var/lib/headscale
    ports:
      - "8080:8080"  # Headscale
      - "8081:8081"  # VPN Wrapper
      - "9090:9090"  # Metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - production_edge_core
    command: /start

  # Metrics Storage
  edge_metrics_storage:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_metrics_storage/Dockerfile
    image: production_edge_metrics_storage
    container_name: production_edge_metrics_storage
    networks:
      - production_edge_core
    ports:
      - "8428:8428"
    volumes:
      - production_edge_metrics_storage_data:/storage
    env_file:
      - ./.envs/.edge_metrics_storage

  # Metrics Collector
  edge_metrics_collector:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_metrics_collector/Dockerfile
    image: production_edge_metrics_collector
    container_name: production_edge_metrics_collector
    networks:
      - production_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin:
        condition: service_healthy
      edge_metrics_storage:
        condition: service_started
    volumes:
      - production_edge_metrics_collector_data:/vmagent-data
      - production_edge_metrics_collector_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ../../deploy/production/compose/edge_metrics_collector/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    env_file:
      - ./.envs/.edge_metrics_collector
    ports:
      - "8429:8429"
      - "8430:8430"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    command: /start
