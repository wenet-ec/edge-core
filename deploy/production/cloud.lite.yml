# deploy/production/cloud.lite.yml
# Use for hobbyist / single-node deployments.
networks:
  production_edge_core:
    name: production_edge_core

volumes:
  production_edge_admin_db_data: {}
  production_edge_vpn_data: {}
  production_edge_vpn_dns_config: {}
  production_edge_vpn_broker_data: {}
  production_edge_http_proxy_data: {}
  production_edge_http_proxy_config: {}
  production_edge_metrics_data: {}

services:
  # Edge Admin
  edge_admin_db:
    image: docker.io/postgres:18
    container_name: production_edge_admin_db
    networks:
      - production_edge_core
    volumes:
      - production_edge_admin_db_data:/var/lib/postgresql
    env_file:
      - ./.envs/.edge_admin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  edge_admin_a1:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
    image: production_edge_admin
    container_name: production_edge_admin_a1
    networks:
      - production_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    ports:
      - "34000:44000" # API
      - "33128:43128" # HTTP proxy
      - "31080:41080" # SOCKS5 proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  # Edge VPN Stack
  edge_vpn_broker:
    image: eclipse-mosquitto:latest
    container_name: production_edge_vpn_broker
    networks:
      - production_edge_core
    volumes:
      - ./compose/edge_vpn_broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - production_edge_vpn_broker_data:/mosquitto/data
    ports:
      - "48083:8083" # WebSocket
    healthcheck:
      test:
        [
          "CMD",
          "mosquitto_sub",
          "-t",
          "$$SYS/#",
          "-C",
          "1",
          "-i",
          "healthcheck",
          "-W",
          "3",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  edge_vpn:
    image: gravitl/netmaker:v1.5.1
    container_name: production_edge_vpn
    networks:
      - production_edge_core
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - production_edge_vpn_data:/root/data
      - production_edge_vpn_dns_config:/root/config/dnsconfig
      - /dev/net/tun:/dev/net/tun:rw
    env_file:
      - ./.envs/.edge_vpn
    environment:
      - BROKER_TYPE=mosquitto
      - DATABASE=sqlite
    depends_on:
      edge_vpn_broker:
        condition: service_healthy
    ports:
      - "48081:8081" # API
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8081/api/server/status",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge_vpn_ui:
    container_name: production_edge_vpn_ui
    image: gravitl/netmaker-ui:v1.5.1
    networks:
      - production_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    ports:
      - "48080:80"
    environment:
      - BACKEND_URL=https://edge-vpn.yourdomain.com

  edge_vpn_dns:
    image: coredns/coredns:latest
    container_name: production_edge_vpn_dns
    user: "0:0"
    networks:
      - production_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    volumes:
      - production_edge_vpn_dns_config:/root/config/dnsconfig
    command: -conf /root/config/dnsconfig/Corefile

  # HTTP Reverse Proxy
  edge_http_proxy:
    image: caddy:alpine
    container_name: production_edge_http_proxy
    networks:
      - production_edge_core
    ports:
      - "40080:80"
    volumes:
      - ./compose/edge_http_proxy/Caddyfile.lite:/etc/caddy/Caddyfile
      - production_edge_http_proxy_data:/data
      - production_edge_http_proxy_config:/config
    depends_on:
      - edge_vpn
    command: caddy run --config /etc/caddy/Caddyfile

  # TCP Forward Proxy Load Balancer
  edge_tcp_proxy:
    image: haproxy:latest
    container_name: production_edge_tcp_proxy
    networks:
      - production_edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
    volumes:
      - ./compose/edge_tcp_proxy/haproxy.lite.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "53128:43128" # HTTP forward proxy
      - "51080:41080" # SOCKS5 proxy

  # Metrics
  edge_metrics:
    image: prom/prometheus:latest
    container_name: production_edge_metrics
    networks:
      - production_edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
    ports:
      - "49090:9090"
    volumes:
      - production_edge_metrics_data:/prometheus
      - ./compose/edge_metrics/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
