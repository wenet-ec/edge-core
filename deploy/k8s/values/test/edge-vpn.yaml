# deploy/k8s/values/test/edge-vpn.yaml
replicaCount: 1
nodePort:
  enabled: true
  vpnApi: 30081
  vpnUi: 30079
ui:
  backendUrl: "http://localhost:48081"
dns:
  kubeDnsIp: "10.96.0.10"
persistence:
