services:
  tailscale_test:
    build:
      context: .
      dockerfile: Dockerfile.test
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - MIX_ENV=test
      - VPN_WRAPPER_URL=http://mock-vpn
    command: mix test
    depends_on:
      - mock-vpn

  tailscale_test_coverage:
    build:
      context: .
      dockerfile: Dockerfile.test
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - MIX_ENV=test
      - VPN_WRAPPER_URL=http://mock-vpn
    command: mix coveralls.html
    depends_on:
      - mock-vpn

  # Mock VPN service for testing API calls
  mock-vpn:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./test/support/mock_responses:/usr/share/nginx/html
    command: |
      sh -c "
        echo 'server { listen 80; location / { try_files $$uri /404.json; } }' > /etc/nginx/conf.d/default.conf &&
        nginx -g 'daemon off;'
      "