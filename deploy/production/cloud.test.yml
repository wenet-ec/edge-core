# deploy/production/cloud.test.yml
networks:
  production_edge_core:
    name: production_edge_core
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  production_edge_admin_db_data: {}
  production_edge_vpn_data: {}
  production_edge_vpn_db_data: {}
  production_edge_vpn_dns_config: {}
  production_edge_vpn_broker_data: {}
  production_edge_vpn_broker_etc: {}
  production_edge_vpn_broker_logs: {}
  production_edge_http_proxy_data: {}
  production_edge_http_proxy_config: {}
  production_edge_metrics_data: {}
  production_edge_relay_data: {}
  production_edge_relay_map_data: {}
  production_edge_event_broker_nats_data: {}
  production_edge_event_broker_nui_data: {}
  production_edge_event_broker_redpanda_data: {}
  production_edge_event_broker_rabbitmq_data: {}
  production_edge_event_broker_redis_data: {}

services:
  # Edge Admin
  edge_admin_db:
    image: docker.io/postgres:18
    container_name: production_edge_admin_db
    networks:
      - production_edge_core
    volumes:
      - production_edge_admin_db_data:/var/lib/postgresql
    env_file:
      - ./.envs/.edge_admin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  edge_admin_a1:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
    image: production_edge_admin
    container_name: production_edge_admin_a1
    networks:
      - production_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.25.0.100"
      - "edge-vpn-broker.localtest.me:172.25.0.100"
      - "edge-admin.localtest.me:172.25.0.100"
      # All brokers resolve via /etc/hosts — bypasses Docker DNS which netclient breaks
      # by rewriting /etc/resolv.conf on VPN join.
      - "edge_event_broker_nats:172.25.0.110"
      - "edge_event_broker_kafka:172.25.0.111"
      - "edge_event_broker_rabbitmq:172.25.0.112"
      - "edge_event_broker_redis:172.25.0.113"
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    environment:
      - NETMAKER_API_URL=http://edge-vpn.localtest.me
      - NETMAKER_API_SCHEME=http
    ports:
      - "34000:44000"
      - "33128:43128" # HTTP proxy
      - "31080:41080" # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  edge_admin_a2:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
    image: production_edge_admin
    container_name: production_edge_admin_a2
    networks:
      - production_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.25.0.100"
      - "edge-vpn-broker.localtest.me:172.25.0.100"
      # All brokers resolve via /etc/hosts — bypasses Docker DNS which netclient breaks
      # by rewriting /etc/resolv.conf on VPN join.
      - "edge_event_broker_nats:172.25.0.110"
      - "edge_event_broker_kafka:172.25.0.111"
      - "edge_event_broker_rabbitmq:172.25.0.112"
      - "edge_event_broker_redis:172.25.0.113"
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
      edge_admin_a1:
        condition: service_healthy
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    environment:
      - NETMAKER_API_URL=http://edge-vpn.localtest.me
      - NETMAKER_API_SCHEME=http
    ports:
      - "34001:44000"
      - "33129:43128" # HTTP proxy
      - "31081:41080" # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  edge_admin_b1:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
    image: production_edge_admin
    container_name: production_edge_admin_b1
    networks:
      - production_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.25.0.100"
      - "edge-vpn-broker.localtest.me:172.25.0.100"
      # All brokers resolve via /etc/hosts — bypasses Docker DNS which netclient breaks
      # by rewriting /etc/resolv.conf on VPN join.
      - "edge_event_broker_nats:172.25.0.110"
      - "edge_event_broker_kafka:172.25.0.111"
      - "edge_event_broker_rabbitmq:172.25.0.112"
      - "edge_event_broker_redis:172.25.0.113"
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
      edge_admin_a1:
        condition: service_healthy
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    environment:
      - ADMIN_CLUSTER_NAME=b
      - ADMIN_CLUSTER_SUBNET=100.63.1.0/24
      - NETMAKER_API_URL=http://edge-vpn.localtest.me
      - NETMAKER_API_SCHEME=http
    ports:
      - "34002:44000"
      - "33130:43128" # HTTP proxy
      - "31082:41080" # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  # Edge VPN Stack
  edge_vpn_db:
    image: postgres:18
    container_name: production_edge_vpn_db
    networks:
      - production_edge_core
    volumes:
      - production_edge_vpn_db_data:/var/lib/postgresql
    env_file:
      - ./.envs/.edge_vpn_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge_vpn_broker:
    image: emqx/emqx:5.8.9
    container_name: production_edge_vpn_broker
    networks:
      - production_edge_core
    volumes:
      - production_edge_vpn_broker_data:/opt/emqx/data
      - production_edge_vpn_broker_etc:/opt/emqx/etc
      - production_edge_vpn_broker_logs:/opt/emqx/log
      - ./compose/edge_vpn_broker/emqx.conf:/opt/emqx/data/configs/cluster.hocon
    env_file:
      - ./.envs/.edge_vpn_broker
    ports:
      - "48083:8083" # WebSocket
      - "48085:18083" # REST API + UI
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  edge_vpn:
    image: gravitl/netmaker:v1.5.1
    container_name: production_edge_vpn
    networks:
      - production_edge_core
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - production_edge_vpn_data:/root/data
      - production_edge_vpn_dns_config:/root/config/dnsconfig
      - /dev/net/tun:/dev/net/tun:rw
    env_file:
      - ./.envs/.edge_vpn
    environment:
      - SERVER_HOST=edge-vpn.localtest.me
      - SERVER_HTTP_HOST=edge-vpn.localtest.me
      - BROKER_ENDPOINT=ws://edge-vpn-broker.localtest.me/mqtt
      - SERVER_API_CONN_STRING=edge-vpn.localtest.me
    depends_on:
      edge_vpn_db:
        condition: service_healthy
      edge_vpn_broker:
        condition: service_healthy
    ports:
      - "48081:8081"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8081/api/server/status",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge_vpn_ui:
    container_name: production_edge_vpn_ui
    image: gravitl/netmaker-ui:v1.5.1
    networks:
      - production_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    ports:
      - "48080:80"
    environment:
      - BACKEND_URL=http://edge-vpn.localtest.me

  edge_vpn_dns:
    image: coredns/coredns:latest
    container_name: production_edge_vpn_dns
    user: "0:0"
    networks:
      - production_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    volumes:
      - production_edge_vpn_dns_config:/root/config/dnsconfig
    command: -conf /root/config/dnsconfig/Corefile

  # HTTP Reverse Proxy
  edge_http_proxy:
    image: caddy:alpine
    container_name: production_edge_http_proxy
    networks:
      production_edge_core:
        ipv4_address: 172.25.0.100
        aliases:
          - edge-vpn.localtest.me
          - edge-vpn-broker.localtest.me
    ports:
      - "80:80"
    volumes:
      - ./compose/edge_http_proxy/Caddyfile.test:/etc/caddy/Caddyfile
      - production_edge_http_proxy_data:/data
      - production_edge_http_proxy_config:/config
    depends_on:
      - edge_vpn
    command: caddy run --config /etc/caddy/Caddyfile

  # TCP Forward Proxy Load Balancer
  edge_tcp_proxy:
    image: haproxy:latest
    container_name: production_edge_tcp_proxy
    networks:
      - production_edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
      edge_admin_a2:
        condition: service_healthy
      edge_admin_b1:
        condition: service_healthy
    volumes:
      - ./compose/edge_tcp_proxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "53128:43128" # HTTP forward proxy
      - "51080:41080" # SOCKS5 proxy

  # Metrics
  edge_metrics:
    image: prom/prometheus:latest
    container_name: production_edge_metrics
    networks:
      - production_edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
    ports:
      - "49090:9090"
    volumes:
      - production_edge_metrics_data:/prometheus
      - ./compose/edge_metrics/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"

  # Edge Relay (dev mode — no TLS, plain HTTP)
  edge_relay:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_relay/Dockerfile
    image: production_edge_relay
    container_name: production_edge_relay
    networks:
      - production_edge_core
    volumes:
      - production_edge_relay_data:/var/lib/derper
    environment:
      DERP_DEV_MODE: "true"
    ports:
      - "43340:3340" # DERP (dev mode, plain HTTP)
      - "43478:3478/udp" # STUN
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3340/derp/probe"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Edge Relay Map
  edge_relay_map:
    image: caddy:alpine
    container_name: production_edge_relay_map
    networks:
      - production_edge_core
    volumes:
      - production_edge_relay_map_data:/data
      - ./compose/edge_relay_map/Caddyfile.test:/etc/caddy/Caddyfile:ro
      - ./compose/edge_relay_map/derp-map.test.json:/srv/derp-map.json:ro
    ports:
      - "47713:47713" # Edge relay map (plain HTTP, dev mode)
    command: caddy run --config /etc/caddy/Caddyfile
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:47713/derpmap/default"]
      interval: 30s
      timeout: 5s
      retries: 3

