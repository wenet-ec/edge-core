# examples/event_brokers/config/rabbitmq.conf

# Single-node setup
cluster_name = edge-event-broker

# Queues — classic durable; switch to quorum when clustering
default_queue_type = classic

# Connection tuning
heartbeat = 60
channel_max = 128
consumer_timeout = 1800000

# Memory & disk alarms
vm_memory_high_watermark.relative = 0.6
disk_free_limit.relative = 1.5

# Management plugin
management.tcp.port = 15672
management.tcp.ip = 0.0.0.0
deprecated_features.permit.management_metrics_collection = true

# Logging to stdout (required for Docker)
log.console = true
log.console.level = warning

# Auth — credentials set via RABBITMQ_DEFAULT_USER / RABBITMQ_DEFAULT_PASS env vars.
# TLS — uncomment to enable (requires certs mounted at /etc/rabbitmq/tls/):
# listeners.ssl.default = 5671
# ssl_options.cacertfile = /etc/rabbitmq/tls/ca.crt
# ssl_options.certfile   = /etc/rabbitmq/tls/server.crt
# ssl_options.keyfile    = /etc/rabbitmq/tls/server.key
# ssl_options.verify     = verify_peer
# ssl_options.fail_if_no_peer_cert = false
