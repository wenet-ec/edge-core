{{- /* deploy/k8s/charts/edge-admin/templates/service.yaml */ -}}
{{/* ClusterIP — API + proxy ports */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-admin.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-admin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "edge-admin.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: 44000
      targetPort: api
      protocol: TCP
    - name: http-proxy
      port: 43128
      targetPort: http-proxy
      protocol: TCP
    - name: socks5-proxy
      port: 41080
      targetPort: socks5-proxy
      protocol: TCP

{{- if .Values.nodePort.enabled }}
---
{{/* NodePort — exposes all ports to host via kind port mappings (local testing only). */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-admin.fullname" . }}-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-admin.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    {{- include "edge-admin.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: 44000
      targetPort: api
      protocol: TCP
      nodePort: {{ .Values.nodePort.apiPort }}
    - name: http-proxy
      port: 43128
      targetPort: http-proxy
      protocol: TCP
      nodePort: {{ .Values.nodePort.httpProxyPort }}
    - name: socks5-proxy
      port: 41080
      targetPort: socks5-proxy
      protocol: TCP
      nodePort: {{ .Values.nodePort.socks5Port }}
{{- end }}

---
{{/* Headless — stable per-pod DNS for Erlang distribution.
     Erlang nodes address each other via VPN DNS (nm.internal), but this service
     is harmless as Deployment (no ordinal DNS) and required as StatefulSet. */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-admin.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-admin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "edge-admin.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: 44000
      targetPort: api
      protocol: TCP
