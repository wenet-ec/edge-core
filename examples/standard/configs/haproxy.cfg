# examples/standard/configs/haproxy.cfg
global
  log stdout format raw local0 info
  maxconn 50000

defaults
  log global
  mode tcp
  option tcplog
  option dontlognull
  timeout connect 5s
  timeout client 1m
  timeout server 1m

# HTTP forward proxy
frontend http_proxy_front
  bind *:43128
  default_backend http_proxy_back

backend http_proxy_back
  balance roundrobin
  server admin_a1 edge_admin_a1:43128 check inter 10s
  server admin_a2 edge_admin_a2:43128 check inter 10s
  server admin_b1 edge_admin_b1:43128 check inter 10s
  server admin_b2 edge_admin_b2:43128 check inter 10s

# SOCKS5 proxy
frontend socks5_proxy_front
  bind *:41080
  default_backend socks5_proxy_back

backend socks5_proxy_back
  balance roundrobin
  server admin_a1 edge_admin_a1:41080 check inter 10s
  server admin_a2 edge_admin_a2:41080 check inter 10s
  server admin_b1 edge_admin_b1:41080 check inter 10s
  server admin_b2 edge_admin_b2:41080 check inter 10s

# Stats page (internal only)
frontend stats
  bind *:8404
  mode http
  stats enable
  stats uri /stats
  stats refresh 10s
