# deploy/production/compose/edge_event_broker/redis.conf

# Redis configuration for edge event broker
port 6379
bind 0.0.0.0
protected-mode no

# Persistence — AOF only, RDB disabled
save ""
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Replication
repl-diskless-sync yes
repl-diskless-sync-delay 0

# Logging
loglevel warning
logfile ""

# General
daemonize no
databases 16
