# .github/workflows/docs.yml
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "examples/**/README.md"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/_meta/requirements.txt

      - run: pip install -r docs/_meta/requirements.txt

      - run: mkdocs build

      - uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-docs
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-docs