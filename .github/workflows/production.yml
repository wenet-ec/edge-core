# .github/workflows/production.yml
name: Production Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker-hub.wenet.vn
  IMAGE_TAG: beta1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        service:
          - name: edge_admin
            dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
            image: edge_admin
          - name: edge_vpn
            dockerfile: ./deploy/production/compose/edge_vpn/Dockerfile
            image: edge_vpn
          - name: edge_metrics_storage
            dockerfile: ./deploy/production/compose/edge_metrics_storage/Dockerfile
            image: edge_metrics_storage
          - name: edge_metrics_collector
            dockerfile: ./deploy/production/compose/edge_metrics_collector/Dockerfile
            image: edge_metrics_collector
          - name: edge_agent
            dockerfile: ./deploy/production/compose/edge_agent/Dockerfile
            image: edge_agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            env.BUILDKIT_STEP_LOG_MAX_SIZE=10485760
            env.BUILDKIT_STEP_LOG_MAX_SPEED=10485760

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.service.image }}:${{ env.IMAGE_TAG }}
          platforms: linux/amd64,linux/arm64
          cache-from: |
            type=gha,scope=${{ matrix.service.name }}-build
            type=gha,scope=${{ matrix.service.name }}-mod
            type=registry,ref=${{ env.REGISTRY }}/${{ matrix.service.image }}:cache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.service.name }}-build
            type=gha,mode=max,scope=${{ matrix.service.name }}-mod
            type=registry,ref=${{ env.REGISTRY }}/${{ matrix.service.image }}:cache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BUILDKIT_MULTI_PLATFORM=1
            BUILDKIT_CACHE_MOUNT_NS=${{ matrix.service.name }}
          provenance: false
          sbom: false

      - name: Output image info
        run: |
          echo "✅ Built and pushed: ${{ env.REGISTRY }}/${{ matrix.service.image }}:${{ env.IMAGE_TAG }}"

  summary:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "🚀 Production build completed!"
          echo "📦 All images tagged with: ${{ env.IMAGE_TAG }}"
          echo "🏪 Registry: ${{ env.REGISTRY }}"
          echo ""
          echo "Built images:"
          echo "• ${{ env.REGISTRY }}/edge_admin:${{ env.IMAGE_TAG }}"
          echo "• ${{ env.REGISTRY }}/edge_vpn:${{ env.IMAGE_TAG }}"
          echo "• ${{ env.REGISTRY }}/edge_metrics_storage:${{ env.IMAGE_TAG }}"
          echo "• ${{ env.REGISTRY }}/edge_metrics_collector:${{ env.IMAGE_TAG }}"
          echo "• ${{ env.REGISTRY }}/edge_agent:${{ env.IMAGE_TAG }}"
