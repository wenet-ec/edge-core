services:
  application:
    image: edge_admin:0.0.1
    container_name: edge_admin
    env_file: .env.dev
    environment:
      - DATABASE_URL=postgres://postgres:development@postgresql/edge_admin_dev
    ports:
      - 4000:4000
    depends_on:
      - postgresql
  postgresql:
    image: postgres:14-bookworm
    container_name: edge_admin-postgres
    environment:
      - POSTGRES_DB=edge_admin_dev
      - POSTGRES_PASSWORD=development
    ports:
      - 5432:5432
    volumes:
      - edge_admin_psql:/var/lib/postgresql/data
volumes:
  edge_admin_psql:
