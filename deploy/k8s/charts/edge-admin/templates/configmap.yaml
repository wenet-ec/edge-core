{{- /* deploy/k8s/charts/edge-admin/templates/configmap.yaml */ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edge-admin.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-admin.labels" . | nindent 4 }}
data:
  # --- Required: Phoenix / public hostname ---
  PHX_HOST: {{ .Values.config.phxHost | quote }}
  ADMIN_URLS: {{ .Values.config.adminUrls | quote }}

  # --- Required: Database ---
  DB_HOST: {{ .Values.config.dbHost | quote }}
  DB_PORT: {{ .Values.config.dbPort | quote }}
  DB_NAME: {{ .Values.config.dbName | quote }}
  DB_USER: {{ .Values.config.dbUser | quote }}
  DB_POOL_SIZE: {{ .Values.config.dbPoolSize | quote }}
  {{- if .Values.config.dbNotifierHost }}
  DB_NOTIFIER_HOST: {{ .Values.config.dbNotifierHost | quote }}
  {{- end }}
  {{- if .Values.config.dbNotifierPort }}
  DB_NOTIFIER_PORT: {{ .Values.config.dbNotifierPort | quote }}
  {{- end }}

  # --- Required: VPN ---
  NETMAKER_API_URL: {{ .Values.config.netmakerApiUrl | quote }}
  NETMAKER_SUPERADMIN_USERNAME: {{ .Values.config.netmakerSuperadminUsername | quote }}

  # --- Required: Admin cluster identity ---
  ADMIN_CLUSTER_NAME: {{ .Values.config.adminClusterName | quote }}
  ADMIN_CLUSTER_SUBNET: {{ .Values.config.adminClusterSubnet | quote }}
  ADMIN_MAX_CAPACITY: {{ .Values.config.adminMaxCapacity | quote }}

  # --- Required: enrollment + self-referential metrics ---
  DEFAULT_CLUSTER_NAME: {{ .Values.config.defaultClusterName | quote }}
  METRICS_BASE_URL: {{ .Values.config.metricsBaseUrl | quote }}

  # --- extraEnv: free-form overrides ---
  {{- range $key, $value := .Values.extraEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
