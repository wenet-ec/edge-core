# deploy/k8s/kind-config.yaml
# Local kind cluster config for testing the k8s setup.
# Mirrors the same philosophy as deploy/production/cloud.test.yml —
# real production images, localtest.me domains, everything local.
#
# Usage:
#   kind create cluster --name edge-core --config deploy/k8s/kind-config.yaml
#   helmfile apply -f deploy/k8s/helmfile.test.yaml
#   kind delete cluster --name edge-core
#
# Port mappings expose NodePort services to localhost so you can hit them
# without kubectl port-forward for every service.
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    extraPortMappings:
      # Edge Admin cluster-a: API, HTTP proxy, SOCKS5
      - containerPort: 30000
        hostPort: 34000
        protocol: TCP
      - containerPort: 30100
        hostPort: 33128
        protocol: TCP
      - containerPort: 30101
        hostPort: 31080
        protocol: TCP
      # Edge Admin cluster-b: API, HTTP proxy, SOCKS5
      - containerPort: 30002
        hostPort: 34002
        protocol: TCP
      - containerPort: 30102
        hostPort: 33130
        protocol: TCP
      - containerPort: 30103
        hostPort: 31082
        protocol: TCP
      # Edge VPN API
      - containerPort: 30081
        hostPort: 48081
        protocol: TCP
      # EMQX WebSocket
      - containerPort: 30083
        hostPort: 48083
        protocol: TCP
      # EMQX Dashboard
      - containerPort: 30085
        hostPort: 48085
        protocol: TCP
