{{- /* deploy/k8s/charts/edge-vpn/templates/service.yaml */ -}}
{{/* ClusterIP — Edge VPN REST API, reachable by edge-admin at http://edge-vpn:8081 */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-vpn.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-vpn.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "edge-vpn.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: 8081
      targetPort: api
      protocol: TCP

---
{{/* Headless — stable per-pod DNS for StatefulSet (edge-vpn-0, edge-vpn-1) */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-vpn.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-vpn.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "edge-vpn.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: 8081
      targetPort: api
      protocol: TCP

---
{{- if .Values.nodePort.enabled }}
---
{{/* NodePort — local testing only. Exposes Edge VPN API and UI to the host
     via kind extraPortMappings. Do not use in production. */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-vpn.fullname" . }}-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-vpn.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    {{- include "edge-vpn.selectorLabels" . | nindent 4 }}
  ports:
    - name: edge-vpn-api
      port: 8081
      targetPort: api
      nodePort: {{ .Values.nodePort.vpnApi }}
      protocol: TCP
    {{- if .Values.ui.enabled }}
    - name: edge-vpn-ui
      port: 80
      targetPort: ui
      nodePort: {{ .Values.nodePort.vpnUi }}
      protocol: TCP
    {{- end }}
{{- end }}

---
{{/* DNS service — exposes Edge VPN DNS sidecar to the cluster for .nm.internal resolution.
     edge-admin pods must set dnsConfig.nameservers to this service's ClusterIP
     (or use the service name) to resolve VPN node hostnames. */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-vpn.fullname" . }}-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-vpn.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "edge-vpn.selectorLabels" . | nindent 4 }}
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
