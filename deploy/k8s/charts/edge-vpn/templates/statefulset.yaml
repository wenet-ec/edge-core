{{- /* deploy/k8s/charts/edge-vpn/templates/statefulset.yaml */ -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "edge-vpn.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-vpn.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "edge-vpn.fullname" . }}-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "edge-vpn.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edge-vpn.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        # --- Edge VPN Server ---
        - name: edge-vpn-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "edge-vpn.fullname" . }}-env
            - secretRef:
                name: {{ include "edge-vpn.secretName" . }}
          volumeMounts:
            - name: edge-vpn-data
              mountPath: /root/data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/server/status
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/server/status
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

        # --- Edge VPN UI sidecar ---
        # Serves the Netmaker React SPA. Browser points BACKEND_URL at the externally
        # reachable Netmaker API (nodeport in test, ingress in prod).
        {{- if .Values.ui.enabled }}
        - name: edge-vpn-ui
          image: "{{ .Values.ui.image }}:{{ .Values.ui.tag }}"
          imagePullPolicy: {{ .Values.ui.pullPolicy }}
          env:
            - name: BACKEND_URL
              value: {{ .Values.ui.backendUrl | quote }}
          ports:
            - name: ui
              containerPort: 80
              protocol: TCP
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
        {{- end }}

  volumeClaimTemplates:
    - metadata:
        name: edge-vpn-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.persistence.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
