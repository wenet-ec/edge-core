# deploy/k8s/charts/edge-admin/values.yaml
nameOverride: ""
fullnameOverride: ""

# Shared label applied to all admin pods in this core.
# The edge-admin-proxy chart selects on this to route across all admin clusters.
# Must be identical for every edge-admin release belonging to the same core.
coreLabel: "edge-core"

# "Deployment" (default, k8s with proper storage) or "StatefulSet" (weak VPS, local-path storage)
workload:
  kind: Deployment

replicaCount: 2

image:
  repository: ghcr.io/wenet-ec/edge_admin
  tag: "v0.2.0"
  pullPolicy: IfNotPresent

# `config:` lists ONLY env vars that must be set per deployment — no usable
# default exists, or the value is deployment-specific. Everything else
# (timeouts, schedules, feature flags, optional integrations) has a sensible
# default in edge_admin's runtime.exs and is overridable via `extraEnv` below.
#
# To discover the full menu of env vars, see deploy/production/.envs/.edge_admin
# — that file is the canonical documented list.
config:
  # --- Phoenix / public hostname ---
  # Public hostname for the admin API — baked into enrollment keys (ADMIN_URLS)
  phxHost: "edge-admin.yourdomain.com"
  adminUrls: "edge-admin.yourdomain.com"

  # --- Database (CNPG -rw service = always primary) ---
  dbHost: "edge-admin-db-rw"
  dbPort: "5432"
  dbName: "edge_admin_production"
  dbUser: "edge_admin_user"
  dbPoolSize: "10"
  # Optional: when dbHost points at the PgBouncer pooler, set dbNotifierHost
  # to the primary -rw service so Oban's LISTEN connection bypasses pooling.
  # Leave empty when dbHost already targets the primary directly.
  dbNotifierHost: ""
  dbNotifierPort: ""

  # --- Edge VPN API (ClusterDNS — matches edge-vpn service name) ---
  netmakerApiUrl: "http://edge-vpn:8081"
  netmakerSuperadminUsername: "admin"

  # --- Admin cluster Erlang identity ---
  # adminClusterName must be unique per release within the same core.
  adminClusterName: "a"
  adminClusterSubnet: "100.63.0.0/24"
  adminMaxCapacity: "200"

  # --- Default cluster pre-created on first boot ---
  defaultClusterName: "default"

  # --- Self-referential metrics scrape URL — release-specific ---
  # In k8s: ClusterIP service name + port, e.g. "edge-admin-a:44000"
  # Must be set per-release in helmfile.yaml.
  metricsBaseUrl: ""

# Free-form env var overrides. Anything documented in
# deploy/production/.envs/.edge_admin can be set here. Useful for tuning
# timeouts, schedules, feature flags, or enabling optional integrations
# (event broker, DERP, Sentry, Grafana upload, etc.) without forking the chart.
#
# Keys are env var names exactly as the app expects them.
# Values are strings — quote integers and booleans.
#
# extraEnv:
#   LIVE_DASHBOARD_ENABLED: "false"
#   API_DOCS_ENABLED: "false"
#   HEALTH_CHECK_TIMEOUT_MS: "15000"
#   NODE_HEALTH_CHECK_CONCURRENCY: "200"
#   EVENT_BROKER_ENABLED: "true"
#   EVENT_BROKER_ADAPTER: "nats"            # nats | kafka | rabbitmq | redis | mqtt
#   EVENT_BROKER_URLS: "nats://my-nats:4222"
#   EVENT_BROKER_MQTT_QOS: "1"              # MQTT only — 0|1|2 (default 1)
#   EVENT_BROKER_MQTT_SSL: "true"           # MQTT only — TLS toggle
#   EVENT_BROKER_MQTT_CACERT_FILE: "/etc/mqtt/tls/ca.crt"
#   EVENT_BROKER_MQTT_CLIENT_CERT_FILE: "/etc/mqtt/tls/client.crt"
#   EVENT_BROKER_MQTT_CLIENT_KEY_FILE: "/etc/mqtt/tls/client.key"
#   DERP_MAP_URL: "https://relay.example.com/derpmap/default"
#   SENTRY_DSN: "https://..."
#   CORE_NAME: "prod-us"
extraEnv: {}

# Extra volumes / volumeMounts — escape hatch for mounting cert files,
# CA bundles, JWT key files, etc. Used together with extraEnv to point the
# app at the mounted paths. Common case: MQTT mTLS certs.
#
# extraVolumes:
#   - name: mqtt-tls
#     secret:
#       secretName: my-mqtt-client-certs   # Secret with keys: ca.crt, client.crt, client.key
# extraVolumeMounts:
#   - name: mqtt-tls
#     mountPath: /etc/mqtt/tls
#     readOnly: true
extraVolumes: []
extraVolumeMounts: []

# hostAliases — injected into /etc/hosts, bypasses DNS entirely.
# Use this to map Netmaker's public hostname (e.g. edge-vpn.localtest.me) to the
# Caddy reverse proxy ClusterIP, so admin pods resolve it correctly even after
# netclient rewrites /etc/resolv.conf.
# In test: set to Caddy's ClusterIP (resolved by bin/run k8s up after Caddy deploys).
# In prod: leave empty — real DNS handles it.
# Format:
#   - ip: "10.96.x.x"
#     hostnames:
#       - edge-vpn.yourdomain.com
#       - edge-vpn-broker.yourdomain.com
hostAliases: []

# WireGuard requires these sysctls. Set to false in kind/local testing where
# the cluster node doesn't allow unsafe sysctls.
sysctls:
  enabled: true

secrets:
  # Set existingSecret to the name of a pre-created Secret to skip chart-managed secret creation.
  # The Secret must contain: SECRET_KEY_BASE, MASTER_KEY, DB_PASSWORD,
  #   NETMAKER_MASTER_KEY, NETMAKER_SUPERADMIN_PASSWORD, VPN_CLUSTER_COOKIE
  # Optional broker auth (only needed when EVENT_BROKER_ENABLED=true and broker requires auth).
  # RabbitMQ and Redis embed credentials in EVENT_BROKER_URLS — no separate fields needed.
  # Leave fields empty to omit them from the Secret.
  existingSecret: ""
  secretKeyBase: "changeme"
  masterKey: "changeme"
  dbPassword: "changeme"
  netmakerMasterKey: "changeme"
  netmakerSuperadminPassword: "changeme"
  vpnClusterCookie: "changeme"
  # NATS auth — pick one, mutually exclusive (token takes precedence)
  eventBrokerNatsToken: ""       # shared token (simple/self-hosted)
  eventBrokerNatsUsername: ""    # username + password
  eventBrokerNatsPassword: ""
  eventBrokerNatsNkeySeed: ""    # NKey seed — standalone or paired with JWT
  eventBrokerNatsJwt: ""         # JWT credential — used alongside NKey seed
  # Kafka/Redpanda auth
  eventBrokerKafkaUsername: ""
  eventBrokerKafkaPassword: ""
  # MQTT auth — pick one, mutually exclusive (JWT takes precedence)
  eventBrokerMqttJwt: ""         # JWT bearer token, sent in CONNECT password slot
  eventBrokerMqttUsername: ""    # plain credentials
  eventBrokerMqttPassword: ""
  # mTLS certs are NOT secret string fields — mount them via extraVolumes
  # (see extraVolumes/extraVolumeMounts above) and point the app at the
  # mounted paths via extraEnv.EVENT_BROKER_MQTT_*_FILE.

migration:
  # Set to false when the image doesn't exist yet (e.g. local kind testing without a built image)
  enabled: true

nodePort:
  # Enable a NodePort service — needed for kind local testing.
  # In prod, use ingress instead.
  enabled: false
  # NodePort numbers (30000-32767). Must match kind-config.yaml extraPortMappings.
  apiPort: 30000
  httpProxyPort: 30100
  socks5Port: 30101

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  tls: []

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# StatefulSet-only: persistent volume for /etc/netclient state
# Ignored when workload.kind=Deployment
statefulset:
  persistence:
    storageClassName: "local-path"
    size: 128Mi
