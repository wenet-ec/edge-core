# examples/standard/configs/prometheus.yml
#
# Prometheus scrape config — collects metrics from all 4 admin instances.
# Replace METRICS_KEY value with your actual METRICS_KEY (or MASTER_KEY).

global:
  scrape_interval: 30s

scrape_configs:
  # --- Node metrics (scraped via admin HTTP service discovery) ---

  - job_name: "node-host-metrics"
    http_sd_configs:
      - url: "http://edge_admin_a1:44000/api/v1/nodes/metrics/host/discovery"
        authorization:
          type: Bearer
          credentials: change-me-your-metrics-key
    authorization:
      type: Bearer
      credentials: change-me-your-metrics-key

  - job_name: "node-agent-metrics"
    http_sd_configs:
      - url: "http://edge_admin_a1:44000/api/v1/nodes/metrics/agent/discovery"
        authorization:
          type: Bearer
          credentials: change-me-your-metrics-key
    authorization:
      type: Bearer
      credentials: change-me-your-metrics-key

  - job_name: "node-wireguard-metrics"
    http_sd_configs:
      - url: "http://edge_admin_a1:44000/api/v1/nodes/metrics/wireguard/discovery"
        authorization:
          type: Bearer
          credentials: change-me-your-metrics-key
    authorization:
      type: Bearer
      credentials: change-me-your-metrics-key

  # --- Admin self-metrics (all 4 instances) ---

  - job_name: "admin-metrics"
    static_configs:
      - targets:
          - "edge_admin_a1:44000"
          - "edge_admin_a2:44000"
          - "edge_admin_b1:44000"
          - "edge_admin_b2:44000"
    metrics_path: "/api/v1/admins/metrics/self/raw"
    authorization:
      type: Bearer
      credentials: change-me-your-metrics-key

  # --- Metrics infrastructure self-metrics ---

  - job_name: "edge-metrics"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: "/metrics"
