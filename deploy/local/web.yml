# deploy/local/web.yml
networks:
  local_edge_core:
    name: local_edge_core

volumes:
  local_edge_admin_db_data: {}
  local_edge_admin_db_data_backups: {}
  local_edge_admin_deps: {}
  local_edge_admin_build: {}
  local_edge_admin_tailscale_data: {}
  local_edge_agent_data: {}
  local_edge_agent_deps: {}
  local_edge_agent_build: {}
  local_edge_agent_tailscale_data: {}
  local_edge_metrics_storage_data: {}
  local_edge_metrics_collector_data: {}
  local_edge_vpn_data: {}
  local_edge_vpn_db_data: {}
  local_edge_vpn_dns_config: {}
  local_edge_vpn_broker_data: {}
  local_edge_vpn_broker_etc: {}
  local_edge_vpn_broker_logs: {}
  local_edge_vpn_proxy_data: {}
  local_edge_vpn_proxy_config: {}

services:
  # Edge Admin
  edge_admin_db:
    image: docker.io/postgres:18
    container_name: local_edge_admin_db
    networks:
      - local_edge_core
    volumes:
      - local_edge_admin_db_data:/var/lib/postgresql
      - local_edge_admin_db_data_backups:/backups
    env_file:
      - ./.envs/.edge_admin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge_admin:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin
    networks:
      - local_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - ../../edge_admin:/app:z
      - ../../tailscale:/tailscale:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_build:/app/_build
      - local_edge_admin_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    ports:
      - "4000:4000"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    command: /start

  edge_admin_test:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin_test
    networks:
      - local_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - ../../edge_admin:/app:z
      - ../../tailscale:/tailscale:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_build:/app/_build
      - local_edge_admin_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin_test
    profiles:
      - test
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    command: mix test

  # Netmaker VPN Stack
  edge_vpn_db:
    image: postgres:18
    container_name: local_edge_vpn_db
    networks:
      - local_edge_core
    volumes:
      - local_edge_vpn_db_data:/var/lib/postgresql
    env_file:
      - ./.envs/.edge_vpn_db

  edge_vpn_broker:
    image: emqx/emqx:6.0.0
    container_name: local_edge_vpn_broker
    networks:
      - local_edge_core
    ports:
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    volumes:
      - local_edge_vpn_broker_data:/opt/emqx/data
      - local_edge_vpn_broker_etc:/opt/emqx/etc
      - local_edge_vpn_broker_logs:/opt/emqx/log
      - ../../deploy/production/compose/edge_vpn_broker/emqx.conf:/opt/emqx/data/configs/cluster.hocon
    env_file:
      - ./.envs/.edge_vpn_broker

  edge_vpn:
    image: gravitl/netmaker:v1.1.0
    container_name: local_edge_vpn
    networks:
      - local_edge_core
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - local_edge_vpn_data:/root/data
      - local_edge_vpn_dns_config:/root/config/dnsconfig
      - /dev/net/tun:/dev/net/tun:rw
    env_file:
      - ./.envs/.edge_vpn
    ports:
      - "8081:8081"
    depends_on:
      - edge_vpn_db
      - edge_vpn_broker
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/api/server/health || nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 1
      start_period: 10s

  edge_vpn_dns:
    image: coredns/coredns:1.13.1
    container_name: local_edge_vpn_dns
    networks:
      - local_edge_core
    user: "0:0"
    depends_on:
      edge_vpn:
        condition: service_healthy
    volumes:
      - local_edge_vpn_dns_config:/root/config/dnsconfig
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"
    command: -conf /root/config/dnsconfig/Corefile

  edge_vpn_proxy:
    image: caddy:2.10-alpine
    container_name: local_edge_vpn_proxy
    networks:
      - local_edge_core
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ../../deploy/production/compose/edge_vpn_proxy/Caddyfile:/etc/caddy/Caddyfile
      - local_edge_vpn_proxy_data:/data
      - local_edge_vpn_proxy_config:/config
    depends_on:
      - edge_vpn
    command: caddy run --config /etc/caddy/Caddyfile

  # Edge Agent
  edge_agent:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_agent/Dockerfile
    image: local_edge_agent
    container_name: local_edge_agent
    networks:
      - local_edge_core
    depends_on:
      edge_admin:
        condition: service_healthy
      edge_vpn:
        condition: service_healthy
    volumes:
      - ../../edge_agent:/app:z
      - ../../tailscale:/tailscale:z
      - local_edge_agent_deps:/app/deps
      - local_edge_agent_build:/app/_build
      - local_edge_agent_data:/app/data
      - local_edge_agent_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - /:/host:ro
    env_file:
      - ./.envs/.edge_agent
    ports:
      - "4400:4000"
      - "2222:22"
      - "9100:9100"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    privileged: true
    pid: "host"
    command: /start-dev

  edge_agent_test:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_agent/Dockerfile
    image: local_edge_agent
    container_name: local_edge_agent_test
    networks:
      - local_edge_core
    depends_on:
      edge_admin:
        condition: service_healthy
      edge_vpn:
        condition: service_healthy
    volumes:
      - ../../edge_agent:/app:z
      - ../../tailscale:/tailscale:z
      - local_edge_agent_deps:/app/deps
      - local_edge_agent_build:/app/_build
      - local_edge_agent_data:/app/data
      - local_edge_agent_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - /:/host:ro
    env_file:
      - ./.envs/.edge_agent_test
    profiles:
      - test
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    privileged: true
    pid: "host"
    command: mix test

  # Metrics
  edge_metrics_storage:
    image: victoriametrics/victoria-metrics:v1.129.1
    container_name: local_edge_metrics_storage
    networks:
      - local_edge_core
    ports:
      - "8428:8428"
    volumes:
      - local_edge_metrics_storage_data:/storage
    env_file:
      - ./.envs/.edge_metrics_storage
    command:
      - '-envflag.enable'
      - '-envflag.prefix=VM_'

  edge_metrics_collector:
    image: victoriametrics/vmagent:v1.129.1
    container_name: local_edge_metrics_collector
    networks:
      - local_edge_core
    depends_on:
      edge_metrics_storage:
        condition: service_started
    volumes:
      - ../../deploy/production/compose/edge_metrics_collector/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    env_file:
      - ./.envs/.edge_metrics_collector
    ports:
      - "8429:8429"
    command:
      - '-envflag.enable'
      - '-envflag.prefix=VM_'
