# deploy/production/cloud.test.yml
networks:
  production_edge_core:
    name: production_edge_core
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  production_edge_admin_db_data: {}
  production_edge_vpn_data: {}
  production_edge_vpn_db_data: {}
  production_edge_vpn_dns_config: {}
  production_edge_vpn_broker_data: {}
  production_edge_vpn_broker_etc: {}
  production_edge_vpn_broker_logs: {}
  production_edge_vpn_proxy_data: {}
  production_edge_vpn_proxy_config: {}
  production_edge_metrics_storage_data: {}
  production_edge_metrics_collector_data: {}

services:
  # Edge Admin
  edge_admin_db:
    image: docker.io/postgres:18
    container_name: production_edge_admin_db
    networks:
      - production_edge_core
    volumes:
      - production_edge_admin_db_data:/var/lib/postgresql
    env_file:
      - ./.envs/.edge_admin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  edge_admin:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
    image: production_edge_admin
    container_name: production_edge_admin
    networks:
      - production_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.25.0.100"
      - "edge-vpn-broker.localtest.me:172.25.0.100"
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    environment:
      - NETMAKER_API_URL=http://edge-vpn.localtest.me
      - NETMAKER_API_SCHEME=http
    ports:
      - "34000:44000"
      - "33128:43128"  # HTTP proxy
      - "31080:41080"  # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  edge_admin_2:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
    image: production_edge_admin
    container_name: production_edge_admin_2
    networks:
      - production_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.25.0.100"
      - "edge-vpn-broker.localtest.me:172.25.0.100"
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
      edge_admin:
        condition: service_healthy
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    environment:
      - NETMAKER_API_URL=http://edge-vpn.localtest.me
      - NETMAKER_API_SCHEME=http
    ports:
      - "34001:44000"
      - "33129:43128"  # HTTP proxy
      - "31081:41080"  # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  edge_admin_3:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
    image: production_edge_admin
    container_name: production_edge_admin_3
    networks:
      - production_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.25.0.100"
      - "edge-vpn-broker.localtest.me:172.25.0.100"
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
      edge_admin:
        condition: service_healthy
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    environment:
      - ADMIN_CLUSTER_NAME=b
      - ADMIN_CLUSTER_SUBNET=100.63.1.0/24
      - NETMAKER_API_URL=http://edge-vpn.localtest.me
      - NETMAKER_API_SCHEME=http
    ports:
      - "34002:44000"
      - "33130:43128"  # HTTP proxy
      - "31082:41080"  # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  # Netmaker VPN Stack
  edge_vpn_db:
    image: postgres:18
    container_name: production_edge_vpn_db
    networks:
      - production_edge_core
    volumes:
      - production_edge_vpn_db_data:/var/lib/postgresql
    env_file:
      - ./.envs/.edge_vpn_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge_vpn_broker:
    image: emqx/emqx:5.8.9
    container_name: production_edge_vpn_broker
    networks:
      - production_edge_core
    volumes:
      - production_edge_vpn_broker_data:/opt/emqx/data
      - production_edge_vpn_broker_etc:/opt/emqx/etc
      - production_edge_vpn_broker_logs:/opt/emqx/log
      - ./compose/edge_vpn_broker/emqx.conf:/opt/emqx/data/configs/cluster.hocon
    env_file:
      - ./.envs/.edge_vpn_broker
    ports:
      - "48083:8083"    # WebSocket
      - "48085:18083"    # REST API + UI
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  edge_vpn:
    image: gravitl/netmaker:v1.5.0
    container_name: production_edge_vpn
    networks:
      - production_edge_core
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - production_edge_vpn_data:/root/data
      - production_edge_vpn_dns_config:/root/config/dnsconfig
      - /dev/net/tun:/dev/net/tun:rw
    env_file:
      - ./.envs/.edge_vpn
    environment:
      - SERVER_HOST=edge-vpn.localtest.me
      - SERVER_HTTP_HOST=edge-vpn.localtest.me
      - BROKER_ENDPOINT=ws://edge-vpn-broker.localtest.me/mqtt
      - SERVER_API_CONN_STRING=edge-vpn.localtest.me
    depends_on:
      edge_vpn_db:
        condition: service_healthy
      edge_vpn_broker:
        condition: service_healthy
    ports:
      - "48081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/api/server/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge_vpn_ui:
    container_name: edge_vpn_ui
    image: gravitl/netmaker-ui:v1.5.0
    depends_on:
      edge_vpn:
        condition: service_healthy
    ports:
      - "48080:80"
    environment:
      - BACKEND_URL=https://edge-vpn.yourdomain.com

  edge_vpn_dns:
    image: coredns/coredns:latest
    container_name: production_edge_vpn_dns
    user: "0:0"
    networks:
      - production_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    volumes:
      - production_edge_vpn_dns_config:/root/config/dnsconfig
    command: -conf /root/config/dnsconfig/Corefile

  edge_vpn_proxy:
    image: caddy:alpine
    container_name: production_edge_vpn_proxy
    networks:
      production_edge_core:
        ipv4_address: 172.25.0.100
        aliases:
          - edge-vpn.localtest.me
          - edge-vpn-broker.localtest.me
    ports:
      - "80:80"
    volumes:
      - ./compose/edge_vpn_proxy/Caddyfile.test:/etc/caddy/Caddyfile
      - production_edge_vpn_proxy_data:/data
      - production_edge_vpn_proxy_config:/config
    depends_on:
      - edge_vpn
    command: caddy run --config /etc/caddy/Caddyfile

  # Metrics Storage
  edge_metrics_storage:
    image: victoriametrics/victoria-metrics:latest
    container_name: production_edge_metrics_storage
    networks:
      - production_edge_core
    ports:
      - "48428:8428"
    volumes:
      - production_edge_metrics_storage_data:/storage
    env_file:
      - ./.envs/.edge_metrics_storage
    command:
      - '-envflag.enable'
      - '-envflag.prefix=VM_'

  # Metrics Collector
  edge_metrics_collector:
    image: victoriametrics/vmagent:latest
    container_name: production_edge_metrics_collector
    networks:
      - production_edge_core
    depends_on:
      edge_admin:
        condition: service_healthy
      edge_metrics_storage:
        condition: service_started
    volumes:
      - ../../deploy/production/compose/edge_metrics_collector/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    env_file:
      - ./.envs/.edge_metrics_collector
    ports:
      - "48429:8429"
    command:
      - '-envflag.enable'
      - '-envflag.prefix=VM_'
