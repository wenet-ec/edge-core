# .github/workflows/local.yml
name: Local CI Pipeline

on:
  push:
    branches: [ main, develop, dev, test ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge_admin_precommit:
    name: Edge Admin - Precommit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Fetch dependencies
        run: docker compose -f deploy/local/cloud.yml --profile test run --rm edge_admin_test mix deps.get

      - name: Run check suite
        # Use edge_admin_test (depends only on edge_admin_db, not the full VPN stack)
        run: docker compose -f deploy/local/cloud.yml --profile test run --rm edge_admin_test mix check

      - name: Run tests
        run: docker compose -f deploy/local/cloud.yml --profile test run --rm edge_admin_test

  edge_agent_precommit:
    name: Edge Agent - Precommit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Fetch dependencies
        run: docker compose -f deploy/local/edge.yml --profile test run --rm edge_agent_test mix deps.get

      - name: Run check suite
        # Use edge_agent_test (no privileged mounts needed for format/lint/dialyzer)
        run: docker compose -f deploy/local/edge.yml --profile test run --rm edge_agent_test mix check

      - name: Run tests
        run: docker compose -f deploy/local/edge.yml --profile test run --rm edge_agent_test

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [edge_admin_precommit, edge_agent_precommit]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "Edge Admin Precommit: ${{ needs.edge_admin_precommit.result }}"
          echo "Edge Agent Precommit: ${{ needs.edge_agent_precommit.result }}"
          
          if [[ "${{ needs.edge_admin_precommit.result }}" != "success" || 
                "${{ needs.edge_agent_precommit.result }}" != "success" ]]; then
            echo "❌ Some checks failed"
            exit 1
          else
            echo "✅ All checks passed"
          fi
