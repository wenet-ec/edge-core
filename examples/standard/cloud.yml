# examples/standard/cloud.yml
#
# Standard setup — 4 admin instances across 2 clusters (a1, a2, b1, b2),
# PostgreSQL-backed Netmaker, EMQX broker, full metrics stack.
# Intended for production or serious self-hosted deployments.
#
# Cluster layout:
#   Cluster A: edge_admin_a1 (primary), edge_admin_a2 (replica)
#   Cluster B: edge_admin_b1 (primary), edge_admin_b2 (replica)
#
# Usage:
#   docker compose -f cloud.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your values
#   2. Ports that need to be publicly reachable:
#      - 48081 (Netmaker API)
#      - 48083 (EMQX WebSocket / MQTT)
#      - 34000-34003 (Admin APIs)

networks:
  edge_core:
    name: edge_core

volumes:
  edge_admin_db_data: {}
  edge_vpn_data: {}
  edge_vpn_db_data: {}
  edge_vpn_dns_config: {}
  edge_vpn_broker_data: {}
  edge_vpn_broker_etc: {}
  edge_vpn_broker_logs: {}
  edge_http_proxy_data: {}
  edge_http_proxy_config: {}
  edge_metrics_data: {}

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Edge Admin database (shared by all admin instances)
  # ---------------------------------------------------------------------------
  edge_admin_db:
    image: postgres:18
    container_name: edge_admin_db
    restart: unless-stopped
    networks:
      - edge_core
    volumes:
      - edge_admin_db_data:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Cluster A — Admin A1
  # ---------------------------------------------------------------------------
  edge_admin_a1:
    image: ghcr.io/wenet-ec/edge_admin:v0.2.0
    container_name: edge_admin_a1
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      - ADMIN_CLUSTER_NAME=a
      - ADMIN_CLUSTER_SUBNET=${ADMIN_A_CLUSTER_SUBNET}
    ports:
      - "34000:44000" # API
      - "33128:43128" # HTTP proxy
      - "31080:41080" # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  # ---------------------------------------------------------------------------
  # Cluster A — Admin A2
  # ---------------------------------------------------------------------------
  edge_admin_a2:
    image: ghcr.io/wenet-ec/edge_admin:v0.2.0
    container_name: edge_admin_a2
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
      edge_admin_a1:
        condition: service_healthy # startup ordering only — all instances are peers
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      - ADMIN_CLUSTER_NAME=a
      - ADMIN_CLUSTER_SUBNET=${ADMIN_A_CLUSTER_SUBNET}
    ports:
      - "34001:44000" # API
      - "33129:43128" # HTTP proxy
      - "31081:41080" # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  # ---------------------------------------------------------------------------
  # Cluster B — Admin B1
  # ---------------------------------------------------------------------------
  edge_admin_b1:
    image: ghcr.io/wenet-ec/edge_admin:v0.2.0
    container_name: edge_admin_b1
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
      edge_admin_a1:
        condition: service_healthy # startup ordering only — all instances are peers
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      - ADMIN_CLUSTER_NAME=b
      - ADMIN_CLUSTER_SUBNET=${ADMIN_B_CLUSTER_SUBNET}
    ports:
      - "34002:44000" # API
      - "33130:43128" # HTTP proxy
      - "31082:41080" # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  # ---------------------------------------------------------------------------
  # Cluster B — Admin B2
  # ---------------------------------------------------------------------------
  edge_admin_b2:
    image: ghcr.io/wenet-ec/edge_admin:v0.2.0
    container_name: edge_admin_b2
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
      edge_admin_a1:
        condition: service_healthy # startup ordering only — all instances are peers
    volumes:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      - ADMIN_CLUSTER_NAME=b
      - ADMIN_CLUSTER_SUBNET=${ADMIN_B_CLUSTER_SUBNET}
    ports:
      - "34003:44000" # API
      - "33131:43128" # HTTP proxy
      - "31083:41080" # SOCKS5 proxy
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  # ---------------------------------------------------------------------------
  # PostgreSQL — Edge VPN database
  # ---------------------------------------------------------------------------
  edge_vpn_db:
    image: postgres:18
    container_name: edge_vpn_db
    restart: unless-stopped
    networks:
      - edge_core
    volumes:
      - edge_vpn_db_data:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${VPN_DB_NAME}
      POSTGRES_USER: ${VPN_DB_USER}
      POSTGRES_PASSWORD: ${VPN_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # EMQX — production-grade MQTT broker for Edge VPN
  # ---------------------------------------------------------------------------
  edge_vpn_broker:
    image: emqx/emqx:5.8.9
    container_name: edge_vpn_broker
    restart: unless-stopped
    networks:
      edge_core:
        aliases:
          - edge-vpn-broker-1.edge
    volumes:
      - edge_vpn_broker_data:/opt/emqx/data
      - edge_vpn_broker_etc:/opt/emqx/etc
      - edge_vpn_broker_logs:/opt/emqx/log
      - ./configs/emqx.conf:/opt/emqx/data/configs/cluster.hocon
    env_file:
      - .env
    environment:
      EMQX_NAME: edge-vpn-broker
      EMQX_HOST: edge-vpn-broker-1.edge
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
      EMQX_NODE__COOKIE: ${EMQX_NODE_COOKIE}
      EMQX_NODE__DB_BACKEND: rlog
      EMQX_NODE__ROLE: core
      EMQX_CLUSTER__DISCOVERY_STRATEGY: static
      EMQX_CLUSTER__STATIC__SEEDS: "[edge-vpn-broker@edge-vpn-broker-1.edge]"
      EMQX_CLUSTER__AUTOHEAL: "true"
      EMQX_RPC__PORT_DISCOVERY: manual
      EMQX_TELEMETRY__ENABLE: "false"
    ports:
      - "48083:8083" # WebSocket
      - "48085:18083" # EMQX Dashboard
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Edge VPN — WireGuard VPN mesh server
  # ---------------------------------------------------------------------------
  edge_vpn:
    image: gravitl/netmaker:v1.5.1
    container_name: edge_vpn
    restart: unless-stopped
    networks:
      - edge_core
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - edge_vpn_data:/root/data
      - edge_vpn_dns_config:/root/config/dnsconfig
      - /dev/net/tun:/dev/net/tun:rw
    env_file:
      - .env
    depends_on:
      edge_vpn_db:
        condition: service_healthy
      edge_vpn_broker:
        condition: service_healthy
    ports:
      - "48081:8081" # Edge VPN API
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8081/api/server/status",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Edge VPN UI — web dashboard
  # ---------------------------------------------------------------------------
  edge_vpn_ui:
    image: gravitl/netmaker-ui:v1.5.1
    container_name: edge_vpn_ui
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    ports:
      - "48080:80"
    environment:
      - BACKEND_URL=${NETMAKER_API_URL}

  # ---------------------------------------------------------------------------
  # Edge VPN DNS — internal DNS for VPN mesh hostnames
  # ---------------------------------------------------------------------------
  edge_vpn_dns:
    image: coredns/coredns:latest
    container_name: edge_vpn_dns
    restart: unless-stopped
    user: "0:0"
    networks:
      - edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    volumes:
      - edge_vpn_dns_config:/root/config/dnsconfig
    command: -conf /root/config/dnsconfig/Corefile

  # ---------------------------------------------------------------------------
  # Caddy — HTTP reverse proxy for Edge VPN API and admin instances
  # ---------------------------------------------------------------------------
  edge_http_proxy:
    image: caddy:alpine
    container_name: edge_http_proxy
    restart: unless-stopped
    networks:
      - edge_core
    ports:
      - "40080:80"
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile
      - edge_http_proxy_data:/data
      - edge_http_proxy_config:/config
    depends_on:
      - edge_vpn
    command: caddy run --config /etc/caddy/Caddyfile

  # ---------------------------------------------------------------------------
  # HAProxy — TCP load balancer for HTTP/SOCKS5 forward proxies
  # ---------------------------------------------------------------------------
  edge_tcp_proxy:
    image: haproxy:latest
    container_name: edge_tcp_proxy
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
      edge_admin_a2:
        condition: service_healthy
      edge_admin_b1:
        condition: service_healthy
      edge_admin_b2:
        condition: service_healthy
    volumes:
      - ./configs/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "53128:43128" # HTTP forward proxy
      - "51080:41080" # SOCKS5 proxy

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraper and storage
  # ---------------------------------------------------------------------------
  edge_metrics:
    image: prom/prometheus:latest
    container_name: edge_metrics
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
    ports:
      - "49090:9090"
    volumes:
      - edge_metrics_data:/prometheus
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
