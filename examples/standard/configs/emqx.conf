# examples/standard/configs/emqx.conf
#
# EMQX MQTT broker configuration for Netmaker VPN mesh.
# Mount this file into the EMQX container at:
#   /opt/emqx/data/configs/cluster.hocon

authentication = [
  {
    backend = "built_in_database"
    mechanism = "password_based"
    password_hash_algorithm {
      name = "sha256"
      salt_position = "suffix"
    }
    user_id_type = "username"
  }
]

authorization {
  deny_action = ignore
  no_match = allow
  sources = []
}
