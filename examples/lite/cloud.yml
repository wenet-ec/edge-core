# examples/lite/cloud.yml
#
# Lite setup — single admin on SQLite, Mosquitto broker, SQLite-backed Edge VPN.
# Intended for homelab / hobbyist use. No metrics stack, no external database
# container. Edge Admin's database lives on the edge_admin_data volume as a
# single SQLite file.
#
# When you outgrow this (need HA, multi-admin clustering, or more than ~100
# nodes), migrate to examples/standard/ — same admin binary, switched to
# PostgreSQL via DB_ADAPTER=postgres.
#
# Usage:
#   docker compose -f cloud.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your values
#   2. Make sure ports 48081, 48083, 48080, 34000 are reachable from the internet
#      (the Edge VPN server and the admin API need to be publicly accessible)

networks:
  edge_core:
    name: edge_core

volumes:
  edge_admin_data: {}
  edge_vpn_data: {}
  edge_vpn_broker_data: {}
  edge_http_proxy_data: {}
  edge_http_proxy_config: {}

services:
  # ---------------------------------------------------------------------------
  # Edge Admin — management server (SQLite-backed)
  # ---------------------------------------------------------------------------
  edge_admin_a1:
    image: ghcr.io/wenet-ec/edge_admin:v0.2.0
    container_name: edge_admin_a1
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    volumes:
      - edge_admin_data:/app/data
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      # Lite uses SQLite for Edge Admin — single instance, no external DB.
      # The DB file lives on the edge_admin_data volume; default path is
      # /app/data/edge/edge_admin.db (parent dirs created automatically).
      - DB_ADAPTER=sqlite
    ports:
      - "34000:44000" # Admin API
      - "33128:43128" # HTTP proxy
      - "31080:41080" # SOCKS5 proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

  # ---------------------------------------------------------------------------
  # Mosquitto — lightweight MQTT broker for Edge VPN
  # ---------------------------------------------------------------------------
  edge_vpn_broker:
    image: eclipse-mosquitto:latest
    container_name: edge_vpn_broker
    restart: unless-stopped
    networks:
      - edge_core
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - edge_vpn_broker_data:/mosquitto/data
    ports:
      - "48083:8083" # WebSocket (used by Edge VPN)
    healthcheck:
      test:
        [
          "CMD",
          "mosquitto_sub",
          "-t",
          "$$SYS/#",
          "-C",
          "1",
          "-i",
          "healthcheck",
          "-W",
          "3",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Edge VPN — WireGuard VPN mesh server
  # ---------------------------------------------------------------------------
  edge_vpn:
    image: gravitl/netmaker:v1.5.1
    container_name: edge_vpn
    restart: unless-stopped
    networks:
      - edge_core
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - edge_vpn_data:/root/data
      - /dev/net/tun:/dev/net/tun:rw
    env_file:
      - .env
    environment:
      - BROKER_TYPE=mosquitto
      - DATABASE=sqlite
    depends_on:
      edge_vpn_broker:
        condition: service_healthy
    ports:
      - "48081:8081" # Edge VPN API
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8081/api/server/status",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Edge VPN UI — web dashboard
  # ---------------------------------------------------------------------------
  edge_vpn_ui:
    image: gravitl/netmaker-ui:v1.5.1
    container_name: edge_vpn_ui
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    ports:
      - "48080:80"
    environment:
      - BACKEND_URL=${NETMAKER_API_URL}


  # ---------------------------------------------------------------------------
  # Caddy — HTTP reverse proxy for Edge VPN API
  # ---------------------------------------------------------------------------
  edge_http_proxy:
    image: caddy:alpine
    container_name: edge_http_proxy
    restart: unless-stopped
    networks:
      - edge_core
    ports:
      - "40080:80"
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile
      - edge_http_proxy_data:/data
      - edge_http_proxy_config:/config
    depends_on:
      - edge_vpn
    command: caddy run --config /etc/caddy/Caddyfile

  # ---------------------------------------------------------------------------
  # HAProxy — TCP load balancer for HTTP/SOCKS5 forward proxies
  # ---------------------------------------------------------------------------
  edge_tcp_proxy:
    image: haproxy:latest
    container_name: edge_tcp_proxy
    restart: unless-stopped
    networks:
      - edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
    volumes:
      - ./configs/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "53128:43128" # HTTP forward proxy
      - "51080:41080" # SOCKS5 proxy
