{{- /* deploy/k8s/charts/postgres/templates/pooler.yaml */ -}}
{{- if .Values.pooler.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ .Release.Name }}-pooler
  namespace: {{ .Release.Namespace }}
spec:
  cluster:
    name: {{ .Release.Name }}

  # rw — always points at the primary, CNPG updates this automatically on failover
  type: rw

  # Two PgBouncer pods for HA — if one restarts, connections fail over to the other
  instances: {{ .Values.pooler.instances }}

  pgbouncer:
    # transaction mode: a physical PG connection is only held during an active
    # transaction, released immediately on commit/rollback. Allows many more
    # logical client connections than physical PG connections.
    # Note: session-level features (advisory locks, SET LOCAL, prepared statements
    # outside transactions) do not work in transaction mode. Oban and Ecto are
    # both compatible.
    poolMode: transaction

    parameters:
      # Maximum logical client connections across all pools.
      # Sized for: 60 admins × DB_POOL_SIZE(15) = 900, with headroom.
      max_client_conn: {{ .Values.pooler.maxClientConn | quote }}

      # Physical PG connections PgBouncer maintains per database/user pair.
      # In transaction mode, 60 admins at peak generate far fewer concurrent
      # transactions — 25 physical connections handles this comfortably.
      default_pool_size: {{ .Values.pooler.defaultPoolSize | quote }}

      # Keep a minimum number of connections open to avoid cold-start latency
      # when traffic picks up after an idle period.
      min_pool_size: {{ .Values.pooler.minPoolSize | quote }}

      # Reserve connections available when default pool is exhausted —
      # absorbs short bursts (mass command delivery, reconciliation spikes).
      reserve_pool_size: {{ .Values.pooler.reservePoolSize | quote }}
{{- end }}
