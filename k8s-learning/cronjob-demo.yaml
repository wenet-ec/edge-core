apiVersion: batch/v1
kind: CronJob
metadata:
  name: metrics-cleanup
spec:
  schedule: "*/1 * * * *"      # every 1 minute
  concurrencyPolicy: Forbid     # don't run if previous is still running
  successfulJobsHistoryLimit: 3 # keep last 3 successful job records
  failedJobsHistoryLimit: 1     # keep last 1 failed job record
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: cleanup
              image: alpine
              command:
                - /bin/sh
                - -c
                - echo "cleaning up old metrics at $(date)"