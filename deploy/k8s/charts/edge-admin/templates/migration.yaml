{{- /* deploy/k8s/charts/edge-admin/templates/migration.yaml */ -}}
{{- if .Values.migration.enabled }}
{{/* Pre-install/upgrade hook: run DB migrations before new pods start.
     If migration fails, the upgrade is aborted and old pods keep running — zero downtime. */}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "edge-admin.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-admin.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "edge-admin.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "/app/bin/edge_admin"
            - "eval"
            - "EdgeAdmin.Release.migrate()"
          envFrom:
            - configMapRef:
                name: {{ include "edge-admin.fullname" . }}-config
            - secretRef:
                name: {{ include "edge-admin.secretName" . }}
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
{{- end }}
