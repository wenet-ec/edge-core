# examples/lite/mosquitto.conf
#
# Mosquitto MQTT broker config for Netmaker VPN mesh.
# Lightweight alternative to EMQX — suitable for homelab / single-node setups.

# Allow anonymous connections (Netmaker handles its own auth layer)
allow_anonymous true

# WebSocket listener — used by Netmaker server and netclient agents
listener 8083
protocol websockets

# Raw MQTT listener on localhost only — used for Docker healthcheck
listener 1883 127.0.0.1
protocol mqtt

# Reduce log noise
connection_messages false
log_type error
log_type warning
