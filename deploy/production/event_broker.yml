# deploy/production/event_broker.yml
#
# Set EVENT_BROKER_ENABLED=true and EVENT_BROKER_ADAPTER=nats|kafka|rabbitmq|redis
# in .envs/.edge_admin before starting.

networks:
  production_edge_core:
    name: production_edge_core

volumes:
  production_edge_event_broker_nats_data: {}
  production_edge_event_broker_nui_data: {}
  production_edge_event_broker_redpanda_data: {}
  production_edge_event_broker_rabbitmq_data: {}
  production_edge_event_broker_redis_data: {}
  production_edge_event_broker_mqtt_data: {}

services:

  # ---------------------------------------------------------------------------
  # NATS (recommended default)
  # Set EVENT_BROKER_ADAPTER=nats in .envs/.edge_admin
  # Add EVENT_BROKER_NATS_JETSTREAM=true to enable durable log
  # ---------------------------------------------------------------------------

  edge_event_broker_nats:
    image: nats:alpine
    container_name: production_edge_event_broker_nats
    networks:
      - production_edge_core
    volumes:
      - production_edge_event_broker_nats_data:/data
      - ./compose/edge_event_broker/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz?js-enabled-only=true | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "44222:4222"   # NATS client
      - "48222:8222"   # NATS monitoring
    command: ["-c", "/etc/nats/nats.conf"]

  edge_event_broker_nats_ui:
    image: ghcr.io/nats-nui/nui:latest
    container_name: production_edge_event_broker_nats_ui
    networks:
      - production_edge_core
    volumes:
      - production_edge_event_broker_nui_data:/db
      - ./compose/edge_event_broker/nui-context.json:/clicontexts/edge-event-broker.json:ro
    depends_on:
      edge_event_broker_nats:
        condition: service_healthy
    ports:
      - "41311:31311"   # NUI web UI
    command:
      - --db-path=/db/nui.db
      - --nats-cli-contexts=/clicontexts

  # ---------------------------------------------------------------------------
  # Kafka-compatible (Redpanda recommended)
  # Set EVENT_BROKER_ADAPTER=kafka in .envs/.edge_admin
  # ---------------------------------------------------------------------------

  edge_event_broker_kafka:
    container_name: production_edge_event_broker_kafka
    image: docker.redpanda.com/redpandadata/redpanda:latest
    volumes:
      - production_edge_event_broker_redpanda_data:/var/lib/redpanda/data
      # TLS certs — uncomment when enabling TLS (see command flags below):
      # - /etc/redpanda/tls:/etc/redpanda/tls:ro
    networks:
      - production_edge_core
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy|Degraded'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "49092:19092"   # Kafka external
    command:
      - redpanda
      - start
      - --node-id 1
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://edge_event_broker_kafka:9092,external://YOUR_PUBLIC_HOSTNAME:19092
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr edge_event_broker_kafka:33145
      - --set redpanda.default_topic_replications=1
      - --set redpanda.default_topic_partitions=1
      # TLS — uncomment to expose the external listener with TLS.
      # Also set EVENT_BROKER_KAFKA_SSL=true in .envs/.edge_admin.
      # Mount your certs first: add "- /etc/redpanda/tls:/etc/redpanda/tls:ro" to volumes above.
      # - --set redpanda.kafka_api_tls[0].name=external
      # - --set redpanda.kafka_api_tls[0].enabled=true
      # - --set redpanda.kafka_api_tls[0].cert_file=/etc/redpanda/tls/server.crt
      # - --set redpanda.kafka_api_tls[0].key_file=/etc/redpanda/tls/server.key
      # - --set redpanda.kafka_api_tls[0].truststore_file=/etc/redpanda/tls/ca.crt   # optional: mTLS / self-signed CA

  edge_event_broker_kafka_ui:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: production_edge_event_broker_kafka_ui
    networks:
      - production_edge_core
    depends_on:
      edge_event_broker_kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKERS=edge_event_broker_kafka:9092
      - ANALYTICS_ENABLED=false
      - LOGGER_LEVEL=warn
    ports:
      - "49080:8080"   # Redpanda Console

  # ---------------------------------------------------------------------------
  # RabbitMQ
  # Set EVENT_BROKER_ADAPTER=rabbitmq in .envs/.edge_admin
  # ---------------------------------------------------------------------------

  edge_event_broker_rabbitmq:
    image: rabbitmq:management-alpine
    container_name: production_edge_event_broker_rabbitmq
    networks:
      production_edge_core:
        ipv4_address: 172.25.0.112
    volumes:
      - production_edge_event_broker_rabbitmq_data:/var/lib/rabbitmq
      - ./compose/edge_event_broker/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./compose/edge_event_broker/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      # TLS certs — uncomment when enabling TLS (see rabbitmq.conf TLS block):
      # - /etc/rabbitmq/tls:/etc/rabbitmq/tls:ro
    environment:
      - RABBITMQ_DEFAULT_USER=edge
      - RABBITMQ_DEFAULT_PASS=edge
      - RABBITMQ_ERLANG_COOKIE=edge-event-broker-cookie
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "45672:5672"    # AMQP
      - "41567:15672"   # Management UI
      - "41569:15692"   # Prometheus metrics

  # ---------------------------------------------------------------------------
  # Redis
  # Set EVENT_BROKER_ADAPTER=redis in .envs/.edge_admin
  # ---------------------------------------------------------------------------

  edge_event_broker_redis:
    image: redis:alpine
    container_name: production_edge_event_broker_redis
    networks:
      - production_edge_core
    volumes:
      - production_edge_event_broker_redis_data:/data
      - ./compose/edge_event_broker/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "46379:6379"   # Redis client
    command: ["redis-server", "/etc/redis/redis.conf"]

  # ---------------------------------------------------------------------------
  # MQTT
  # Set EVENT_BROKER_ADAPTER=mqtt in .envs/.edge_admin
  #
  # Default broker is EMQX (ships with built-in dashboard + REST API on port
  # 18083 → 48086 host; default creds: admin / public, change on first login).
  # The MQTT adapter works against any MQTT 3.1.1 / 5 broker — swap the image
  # for Mosquitto / HiveMQ / etc. and update the env vars accordingly.
  # ---------------------------------------------------------------------------

  edge_event_broker_mqtt:
    image: emqx/emqx:5.8.9
    container_name: production_edge_event_broker_mqtt
    hostname: edge_event_broker_mqtt
    networks:
      production_edge_core:
        ipv4_address: 172.25.0.114
    volumes:
      - production_edge_event_broker_mqtt_data:/opt/emqx/data
      - ./compose/edge_event_broker/emqx.conf:/opt/emqx/data/configs/cluster.hocon:ro
      # TLS certs — uncomment when enabling MQTT/TLS on port 8883:
      # - /etc/mqtt/tls:/etc/mqtt/tls:ro
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: edge_event_broker_mqtt
      EMQX_NODE__COOKIE: edge_event_broker_mqtt_cookie
      EMQX_NODE__DB_BACKEND: rlog
      EMQX_NODE__ROLE: core
      EMQX_RPC__PORT_DISCOVERY: manual
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
      # TLS — uncomment to enable MQTT over TLS on 8883.
      # Also set EVENT_BROKER_MQTT_SSL=true in .envs/.edge_admin.
      # Mount your certs first via the volume above.
      # EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: /etc/mqtt/tls/server.crt
      # EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE:  /etc/mqtt/tls/server.key
      # EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE: /etc/mqtt/tls/ca.crt
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "41883:1883"   # MQTT
      - "48883:8883"   # MQTT/TLS
      - "48084:8083"   # MQTT over WebSocket
      - "48086:18083"  # Dashboard + REST API
