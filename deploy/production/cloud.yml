# deploy/production/cloud.yml
networks:
  production_edge_core:
    name: production_edge_core

volumes:
  production_edge_admin_db_data: {}
  production_edge_admin_db_data_backups: {}
  production_edge_admin_netclient_data: {}
  production_edge_metrics_storage_data: {}
  production_edge_metrics_collector_data: {}
  production_edge_vpn_data: {}
  production_edge_vpn_db_data: {}
  production_edge_vpn_dns_config: {}
  production_edge_vpn_broker_data: {}
  production_edge_vpn_broker_etc: {}
  production_edge_vpn_broker_logs: {}
  production_edge_vpn_proxy_data: {}
  production_edge_vpn_proxy_config: {}

services:
  # Edge Admin
  edge_admin_db:
    image: docker.io/postgres:18
    container_name: production_edge_admin_db
    networks:
      - production_edge_core
    volumes:
      - production_edge_admin_db_data:/var/lib/postgresql
      - production_edge_admin_db_data_backups:/backups
    env_file:
      - ./.envs/.edge_admin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  edge_admin:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
    image: production_edge_admin
    container_name: production_edge_admin
    networks:
      - production_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - production_edge_admin_netclient_data:/etc/netclient
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    command: /start

  # Netmaker VPN Stack
  edge_vpn_db:
    image: postgres:18
    container_name: production_edge_vpn_db
    networks:
      - production_edge_core
    volumes:
      - production_edge_vpn_db_data:/var/lib/postgresql
    env_file:
      - ./.envs/.edge_vpn_db

  edge_vpn_broker:
    image: emqx/emqx:6.0.1
    container_name: production_edge_vpn_broker
    networks:
      - production_edge_core
    ports:
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    volumes:
      - production_edge_vpn_broker_data:/opt/emqx/data
      - production_edge_vpn_broker_etc:/opt/emqx/etc
      - production_edge_vpn_broker_logs:/opt/emqx/log
      - ./compose/edge_vpn_broker/emqx.conf:/opt/emqx/data/configs/cluster.hocon
    env_file:
      - ./.envs/.edge_vpn_broker

  edge_vpn:
    image: gravitl/netmaker:v1.2.0
    container_name: production_edge_vpn
    networks:
      - production_edge_core
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - production_edge_vpn_data:/root/data
      - production_edge_vpn_dns_config:/root/config/dnsconfig
      - /dev/net/tun:/dev/net/tun:rw
    env_file:
      - ./.envs/.edge_vpn
    ports:
      - "8081:8081"
    depends_on:
      - edge_vpn_db
      - edge_vpn_broker
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/api/server/health || nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 1
      start_period: 10s

  edge_vpn_dns:
    image: coredns/coredns:1.13.1
    container_name: production_edge_vpn_dns
    networks:
      - production_edge_core
    user: "0:0"
    depends_on:
      edge_vpn:
        condition: service_healthy
    volumes:
      - production_edge_vpn_dns_config:/root/config/dnsconfig
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"
    command: -conf /root/config/dnsconfig/Corefile

  edge_vpn_proxy:
    image: caddy:2.10-alpine
    container_name: production_edge_vpn_proxy
    networks:
      - production_edge_core
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./compose/edge_vpn_proxy/Caddyfile:/etc/caddy/Caddyfile
      - production_edge_vpn_proxy_data:/data
      - production_edge_vpn_proxy_config:/config
    depends_on:
      - edge_vpn
    command: caddy run --config /etc/caddy/Caddyfile

  # Metrics Storage
  edge_metrics_storage:
    image: victoriametrics/victoria-metrics:v1.129.1
    container_name: production_edge_metrics_storage
    networks:
      - production_edge_core
    ports:
      - "8428:8428"
    volumes:
      - production_edge_metrics_storage_data:/storage
    env_file:
      - ./.envs/.edge_metrics_storage
    command:
      - '-envflag.enable'
      - '-envflag.prefix=VM_'

  # Metrics Collector
  edge_metrics_collector:
    image: victoriametrics/vmagent:v1.129.1
    container_name: production_edge_metrics_collector
    networks:
      - production_edge_core
    depends_on:
      edge_admin:
        condition: service_healthy
      edge_metrics_storage:
        condition: service_started
    volumes:
      - ../../deploy/production/compose/edge_metrics_collector/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    env_file:
      - ./.envs/.edge_metrics_collector
    ports:
      - "8429:8429"
    command:
      - '-envflag.enable'
      - '-envflag.prefix=VM_'
