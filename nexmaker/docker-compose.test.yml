services:
  nexmaker_test:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    environment:
      - MIX_ENV=test
      - NETMAKER_BASE_URL=http://netmaker_proxy:80
      - NETMAKER_MASTER_KEY=supersecretkey123456789
    command: mix test --include integration
    depends_on:
      netmaker:
        condition: service_healthy
      coredns:
        condition: service_started
      netmaker_proxy:
        condition: service_started
    networks:
      - test_network

  netmaker_db:
    image: postgres:18
    environment:
      - POSTGRES_DB=netmaker
      - POSTGRES_USER=netmaker
      - POSTGRES_PASSWORD=netmaker123
    networks:
      - test_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netmaker"]
      interval: 5s
      timeout: 5s
      retries: 5

  netmaker_broker:
    image: emqx/emqx:5.8.9
    environment:
      - EMQX_NAME=emqx
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=netmaker123
    volumes:
      - netmaker_broker_data:/opt/emqx/data
      - netmaker_broker_etc:/opt/emqx/etc
      - netmaker_broker_logs:/opt/emqx/log
      - ./emqx.conf:/opt/emqx/data/configs/cluster.hocon
    networks:
      - test_network
    healthcheck:
      test: ["CMD-SHELL", "emqx ctl status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  netmaker:
    image: gravitl/netmaker:v1.5.0
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - netmaker_data:/root/data
      - netmaker_dns_config:/root/config/dnsconfig
    environment:
      - SERVER_NAME=netmaker
      - SERVER_HOST=netmaker_proxy
      - SERVER_HTTP_HOST=netmaker_proxy
      - SERVER_API_CONN_STRING=netmaker_proxy
      - MASTER_KEY=supersecretkey123456789
      - CORS_ALLOWED_ORIGIN=*
      - DISPLAY_KEYS=on
      - DATABASE=postgres
      - SQL_HOST=netmaker_db
      - SQL_PORT=5432
      - SQL_USER=netmaker
      - SQL_PASS=netmaker123
      - SQL_DB=netmaker
      - SQL_SSL_MODE=disable
      - API_PORT=8081
      - DNS_MODE=on
      - COREDNS_ADDR=coredns:53
      - DISABLE_REMOTE_IP_CHECK=on
      - TELEMETRY=off
      - SERVER_BROKER_ENDPOINT=ws://netmaker_broker:8083/mqtt
      - BROKER_ENDPOINT=ws://netmaker_broker:8083/mqtt
      - BROKER_TYPE=emqx
      - EMQX_REST_ENDPOINT=http://netmaker_broker:18083
      - MQ_USERNAME=admin
      - MQ_PASSWORD=netmaker123
      - VERBOSITY=1
      - STUN_LIST=stun1.l.google.com:19302,stun2.l.google.com:19302,stun.stunprotocol.org:3478,stun.nextcloud.com:443,stun.netmaker.io:3478
    depends_on:
      netmaker_db:
        condition: service_healthy
      netmaker_broker:
        condition: service_healthy
    networks:
      - test_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/api/server/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  netmaker_proxy:
    image: caddy:alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      netmaker:
        condition: service_healthy
    networks:
      - test_network
    command: caddy run --config /etc/caddy/Caddyfile

  coredns:
    image: coredns/coredns:latest
    user: "0:0"
    volumes:
      - netmaker_dns_config:/root/config/dnsconfig
    command: -conf /root/config/dnsconfig/Corefile
    depends_on:
      netmaker:
        condition: service_healthy
    networks:
      - test_network
    restart: on-failure

networks:
  test_network:
    driver: bridge

volumes:
  netmaker_data:
  netmaker_dns_config:
  netmaker_broker_data:
  netmaker_broker_etc:
  netmaker_broker_logs:
