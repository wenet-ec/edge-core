{{- /* deploy/k8s/charts/edge-admin/templates/secret.yaml */ -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "edge-admin.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-admin.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY_BASE: {{ .Values.secrets.secretKeyBase | quote }}
  MASTER_KEY: {{ .Values.secrets.masterKey | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  NETMAKER_MASTER_KEY: {{ .Values.secrets.netmakerMasterKey | quote }}
  NETMAKER_SUPERADMIN_PASSWORD: {{ .Values.secrets.netmakerSuperadminPassword | quote }}
  VPN_CLUSTER_COOKIE: {{ .Values.secrets.vpnClusterCookie | quote }}
{{- end }}
