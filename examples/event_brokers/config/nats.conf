# examples/event_brokers/config/nats.conf

server_name: edge-event-broker

http_port: 8222

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 268435456   # 256MB
  max_file_store:  1073741824   # 1GB — tune per deployment
}

# Auth — uncomment to require a token.
# Set the same value in EVENT_BROKER_NATS_TOKEN on the admin.
# authorization {
#   token: "your-secret-token"
# }

# TLS — uncomment to expose a public TLS listener.
# Use tls:// in EVENT_BROKER_NATS_URLS when enabled.
# Clients on the same Docker network can continue using nats:// on port 4222.
# tls {
#   cert_file: /etc/nats/tls/server.crt
#   key_file:  /etc/nats/tls/server.key
#   ca_file:   /etc/nats/tls/ca.crt   # optional: mTLS
#   timeout:   2
# }

# Cluster — uncomment for 3-node HA setup.
# cluster {
#   name: EDGE_EVENT_BROKER_CLUSTER
#   listen: 0.0.0.0:6222
#   routes: [
#     nats-route://edge-event-broker-2:6222
#     nats-route://edge-event-broker-3:6222
#   ]
#   connect_retries: 10
# }
