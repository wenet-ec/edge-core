# deploy/production/compose/edge_event_broker/nats.conf

server_name: edge-event-broker

http_port: 8222

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 268435456   # 256MB
  max_file_store:  1073741824   # 1GB (tune per deployment)
}

# TLS block — uncomment to expose a public TLS listener (use tls:// URLs in EVENT_BROKER_NATS_URLS).
# Clients on the same Docker network can continue using nats:// on port 4222.
# tls {
#   cert_file: /etc/nats/tls/server.crt
#   key_file:  /etc/nats/tls/server.key
#   ca_file:   /etc/nats/tls/ca.crt      # optional: for mutual TLS (mTLS)
#   timeout:   2
# }

