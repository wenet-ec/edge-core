# deploy/local/cloud.lite.yml
# Use for hobbyist / single-node and SQLite local development.
networks:
  local_edge_core:
    name: local_edge_core
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  local_edge_admin_data: {}
  local_edge_admin_test_data: {}
  local_edge_admin_deps: {}
  local_edge_admin_build: {}
  local_edge_vpn_data: {}
  local_edge_vpn_broker_data: {}
  local_edge_http_proxy_data: {}
  local_edge_http_proxy_config: {}
  local_edge_metrics_data: {}

services:
  # Edge Admin
  edge_admin_a1:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin_a1
    networks:
      - local_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.20.0.101"
      - "edge-vpn-broker.localtest.me:172.20.0.101"
    depends_on:
      edge_vpn:
        condition: service_healthy
    volumes:
      - ../../edge_admin:/app:z
      - ../../nexmaker:/nexmaker:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_build:/app/_build
      - local_edge_admin_data:/app/data
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    environment:
      - DB_ADAPTER=sqlite
    ports:
      - "4000:44000"       # API
      - "3128:43128"       # HTTP Proxy
      - "31080:41080"      # SOCKS5 Proxy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 60s

  edge_admin_test:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin_test
    networks:
      - local_edge_core
    volumes:
      - ../../edge_admin:/app:z
      - ../../nexmaker:/nexmaker:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_build:/app/_build
      - local_edge_admin_test_data:/app/data
    env_file:
      - ./.envs/.edge_admin_test
    environment:
      - DB_ADAPTER=sqlite
      - SQLITE_DB_PATH=/app/data/edge_admin_test.db
    profiles:
      - test
    command: mix test

  # Edge VPN Stack
  edge_vpn_broker:
    image: eclipse-mosquitto:latest
    container_name: local_edge_vpn_broker
    networks:
      - local_edge_core
    ports:
      - "48083:8083"
    volumes:
      - ../../deploy/production/compose/edge_vpn_broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - local_edge_vpn_broker_data:/mosquitto/data
    healthcheck:
      test:
        [
          "CMD",
          "mosquitto_sub",
          "-t",
          "$$SYS/#",
          "-C",
          "1",
          "-i",
          "healthcheck",
          "-W",
          "3",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  edge_vpn:
    image: gravitl/netmaker:v1.5.1
    container_name: local_edge_vpn
    networks:
      - local_edge_core
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - local_edge_vpn_data:/root/data
      - /dev/net/tun:/dev/net/tun:rw
    env_file:
      - ./.envs/.edge_vpn
    environment:
      - BROKER_TYPE=mosquitto
      - DATABASE=sqlite
    ports:
      - "48081:8081"
    depends_on:
      edge_vpn_broker:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8081/api/server/status",
        ]
      interval: 10s
      timeout: 5s
      retries: 1
      start_period: 10s

  edge_vpn_ui:
    container_name: local_edge_vpn_ui
    image: gravitl/netmaker-ui:v1.5.1
    networks:
      - local_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://edge-vpn.localtest.me
    ports:
      - "48080:80"

  # HTTP Reverse Proxy
  edge_http_proxy:
    image: caddy:alpine
    container_name: local_edge_http_proxy
    networks:
      local_edge_core:
        ipv4_address: 172.20.0.101
        aliases:
          - edge-vpn.localtest.me
          - edge-vpn-broker.localtest.me
          - edge-admin.localtest.me
    ports:
      - "80:80"
    volumes:
      - ./compose/edge_http_proxy/Caddyfile.lite:/etc/caddy/Caddyfile
      - local_edge_http_proxy_data:/data
      - local_edge_http_proxy_config:/config
    depends_on:
      - edge_vpn
    command: caddy run --config /etc/caddy/Caddyfile

  # TCP Forward Proxy Load Balancer
  edge_tcp_proxy:
    image: haproxy:latest
    container_name: local_edge_tcp_proxy
    networks:
      - local_edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
    volumes:
      - ./compose/edge_tcp_proxy/haproxy.lite.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "53128:43128" # HTTP forward proxy
      - "51080:41080" # SOCKS5 proxy

  # Metrics
  edge_metrics:
    image: prom/prometheus:latest
    container_name: local_edge_metrics
    networks:
      - local_edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
    ports:
      - "49090:9090"
    volumes:
      - local_edge_metrics_data:/prometheus
      - ../../deploy/production/compose/edge_metrics/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
