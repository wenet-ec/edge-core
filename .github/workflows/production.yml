# .github/workflows/production.yml
name: Production Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: v0.2.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        service:
          - name: edge_admin
            dockerfile: ./deploy/production/compose/edge_admin/Dockerfile
            image: edge_admin
          - name: edge_agent
            dockerfile: ./deploy/production/compose/edge_agent/Dockerfile
            image: edge_agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            env.BUILDKIT_STEP_LOG_MAX_SIZE=10485760
            env.BUILDKIT_STEP_LOG_MAX_SPEED=10485760

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/wenet-ec/${{ matrix.service.image }}:${{ env.IMAGE_TAG }}
            ghcr.io/wenet-ec/${{ matrix.service.image }}:latest
            ghcr.io/wenet-ec/${{ matrix.service.image }}:stable
          platforms: linux/amd64,linux/arm64
          cache-from: |
            type=gha,scope=${{ matrix.service.name }}-build
            type=gha,scope=${{ matrix.service.name }}-mod
            type=registry,ref=ghcr.io/wenet-ec/${{ matrix.service.image }}:cache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.service.name }}-build
            type=gha,mode=max,scope=${{ matrix.service.name }}-mod
            type=registry,ref=ghcr.io/wenet-ec/${{ matrix.service.image }}:cache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BUILDKIT_MULTI_PLATFORM=1
            BUILDKIT_CACHE_MOUNT_NS=${{ matrix.service.name }}
          provenance: false
          sbom: false

      - name: Output image info
        run: |
          echo "Built and pushed ${{ matrix.service.name }}:"
          echo "  ghcr.io/wenet-ec/${{ matrix.service.image }}:${{ env.IMAGE_TAG }}"
          echo "  ghcr.io/wenet-ec/${{ matrix.service.image }}:latest"
          echo "  ghcr.io/wenet-ec/${{ matrix.service.image }}:stable"

  summary:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "Production build completed!"
          echo "Tags pushed: ${{ env.IMAGE_TAG }}, latest, stable"
          echo ""
          echo "Registry: ghcr.io/wenet-ec"
          echo "Images: edge_admin, edge_agent"
