# deploy/local/web.yml
networks:
  local_edge_core:
    name: local_edge_core

volumes:
  local_edge_admin_db_data: {}
  local_edge_admin_db_data_backups: {}
  local_edge_admin_deps: {}
  local_edge_admin_build: {}
  local_edge_admin_tailscale_data: {}
  local_edge_vpn_data: {}
  local_edge_agent_data: {}
  local_edge_agent_deps: {}
  local_edge_agent_build: {}
  local_edge_agent_tailscale_data: {}

services:
  # Edge Admin
  edge_admin_db:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/postgres/Dockerfile
    image: local_edge_admin_db
    container_name: local_edge_admin_db
    networks:
      - local_edge_core
    volumes:
      - local_edge_admin_db_data:/var/lib/postgresql/data
      - local_edge_admin_db_data_backups:/backups
    env_file:
      - ./.envs/.edge_admin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  
  edge_admin:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin
    networks:
      - local_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - ../../edge_admin:/app:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_build:/app/_build
      - local_edge_admin_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    ports:
      - "4000:4000"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s
    command: /start
  
  edge_admin_test:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin_test
    networks:
      - local_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - ../../edge_admin:/app:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_build:/app/_build
      - local_edge_admin_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin_test
    profiles:
      - test
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    command: mix test

  # Edge VPN
  edge_vpn:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_vpn/Dockerfile
    container_name: local_edge_vpn
    volumes:
      - ../../deploy/local/compose/edge_vpn/headscale_config:/etc/headscale
      - local_edge_vpn_data:/var/lib/headscale
    ports:
      - "8080:8080"  # Headscale
      - "8081:8081"  # VPN Wrapper
      - "9090:9090"  # Metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - local_edge_core
    command: /start

  # Edge Agent
  edge_agent:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_agent/Dockerfile
    image: local_edge_agent
    container_name: local_edge_agent
    networks:
      - local_edge_core
    depends_on:
      edge_admin:
        condition: service_healthy
      edge_vpn:
        condition: service_healthy
    volumes:
      - ../../edge_agent:/app:z
      - local_edge_agent_deps:/app/deps
      - local_edge_agent_build:/app/_build
      - local_edge_agent_data:/app/data
      - local_edge_agent_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - /:/host:rw
    env_file:
      - ./.envs/.edge_agent
    ports:
      - "4400:4000"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    privileged: true
    pid: "host"
    command: /start
  
  edge_agent_test:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_agent/Dockerfile
    image: local_edge_agent
    container_name: local_edge_agent_test
    networks:
      - local_edge_core
    depends_on:
      edge_admin:
        condition: service_healthy
      edge_vpn:
        condition: service_healthy
    volumes:
      - ../../edge_agent:/app:z
      - local_edge_agent_deps:/app/deps
      - local_edge_agent_build:/app/_build
      - local_edge_agent_data:/app/data
      - local_edge_agent_tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - /:/host:rw
    env_file:
      - ./.envs/.edge_agent_test
    profiles:
      - test
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    privileged: true
    pid: "host"
    command: mix test
