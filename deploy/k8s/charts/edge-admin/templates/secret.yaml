{{- /* deploy/k8s/charts/edge-admin/templates/secret.yaml */ -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "edge-admin.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-admin.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY_BASE: {{ .Values.secrets.secretKeyBase | quote }}
  MASTER_KEY: {{ .Values.secrets.masterKey | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  NETMAKER_MASTER_KEY: {{ .Values.secrets.netmakerMasterKey | quote }}
  NETMAKER_SUPERADMIN_PASSWORD: {{ .Values.secrets.netmakerSuperadminPassword | quote }}
{{ if .Values.secrets.vpnClusterCookie }}
  VPN_CLUSTER_COOKIE: {{ .Values.secrets.vpnClusterCookie | quote }}
{{ end }}
  CLOAK_KEY: {{ .Values.secrets.cloakKey | quote }}
  CLOAK_TAG: {{ .Values.secrets.cloakTag | quote }}
  {{- if .Values.secrets.rotateOldCloakKey }}
  ROTATE_OLD_CLOAK_KEY: {{ .Values.secrets.rotateOldCloakKey | quote }}
  ROTATE_OLD_CLOAK_TAG: {{ .Values.secrets.rotateOldCloakTag | quote }}
  ROTATE_NEW_CLOAK_KEY: {{ .Values.secrets.rotateNewCloakKey | quote }}
  ROTATE_NEW_CLOAK_TAG: {{ .Values.secrets.rotateNewCloakTag | quote }}
  {{- end }}
  {{- if .Values.secrets.eventBrokerNatsToken }}
  EVENT_BROKER_NATS_TOKEN: {{ .Values.secrets.eventBrokerNatsToken | quote }}
  {{- end }}
  {{- if .Values.secrets.eventBrokerNatsUsername }}
  EVENT_BROKER_NATS_USERNAME: {{ .Values.secrets.eventBrokerNatsUsername | quote }}
  EVENT_BROKER_NATS_PASSWORD: {{ .Values.secrets.eventBrokerNatsPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.eventBrokerNatsNkeySeed }}
  EVENT_BROKER_NATS_NKEY_SEED: {{ .Values.secrets.eventBrokerNatsNkeySeed | quote }}
  {{- end }}
  {{- if .Values.secrets.eventBrokerNatsJwt }}
  EVENT_BROKER_NATS_JWT: {{ .Values.secrets.eventBrokerNatsJwt | quote }}
  {{- end }}
  {{- if .Values.secrets.eventBrokerKafkaUsername }}
  EVENT_BROKER_KAFKA_USERNAME: {{ .Values.secrets.eventBrokerKafkaUsername | quote }}
  EVENT_BROKER_KAFKA_PASSWORD: {{ .Values.secrets.eventBrokerKafkaPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.eventBrokerMqttJwt }}
  EVENT_BROKER_MQTT_JWT: {{ .Values.secrets.eventBrokerMqttJwt | quote }}
  {{- end }}
  {{- if .Values.secrets.eventBrokerMqttUsername }}
  EVENT_BROKER_MQTT_USERNAME: {{ .Values.secrets.eventBrokerMqttUsername | quote }}
  EVENT_BROKER_MQTT_PASSWORD: {{ .Values.secrets.eventBrokerMqttPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  {{- end }}
  {{- if .Values.secrets.awsSessionToken }}
  AWS_SESSION_TOKEN: {{ .Values.secrets.awsSessionToken | quote }}
  {{- end }}
{{- end }}
{{- /* Separate Secret for the GCP service-account JSON. Lives in its own
       resource (not the main envFrom Secret) because the value is mounted as
       a file, not loaded as an env var — goth reads GOOGLE_APPLICATION_CREDENTIALS
       as a filesystem path. Skipped entirely when the value is blank (the
       Workload Identity / metadata-server path). */ -}}
{{- if and (not .Values.secrets.existingSecret) .Values.secrets.googleApplicationCredentialsJson }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "edge-admin.fullname" . }}-gcp-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-admin.labels" . | nindent 4 }}
type: Opaque
stringData:
  sa.json: {{ .Values.secrets.googleApplicationCredentialsJson | quote }}
{{- end }}
