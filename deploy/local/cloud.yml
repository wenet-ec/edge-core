# deploy/local/cloud.yml
networks:
  local_edge_core:
    name: local_edge_core
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  local_edge_admin_db_data: {}
  local_edge_admin_deps: {}
  local_edge_admin_a1_build: {}
  local_edge_admin_a2_build: {}
  local_edge_admin_b1_build: {}
  local_edge_vpn_data: {}
  local_edge_vpn_db_data: {}
  local_edge_vpn_dns_config: {}
  local_edge_vpn_broker_data: {}
  local_edge_vpn_broker_etc: {}
  local_edge_vpn_broker_logs: {}
  local_edge_http_proxy_data: {}
  local_edge_http_proxy_config: {}
  local_edge_metrics_storage_data: {}
  local_edge_metrics_collector_data: {}
  local_edge_relay_data: {}
  local_edge_relay_map_data: {}
  local_edge_event_broker_nats_data: {}
  local_edge_event_broker_nui_data: {}
  local_edge_event_broker_redpanda_data: {}

services:
  # Edge Admin
  edge_admin_db:
    image: docker.io/postgres:18
    container_name: local_edge_admin_db
    networks:
      - local_edge_core
    volumes:
      - local_edge_admin_db_data:/var/lib/postgresql
    env_file:
      - ./.envs/.edge_admin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge_admin_a1:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin_a1
    networks:
      - local_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.20.0.101"
      - "edge-vpn-broker.localtest.me:172.20.0.101"
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
    volumes:
      - ../../edge_admin:/app:z
      - ../../nexmaker:/nexmaker:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_a1_build:/app/_build
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    ports:
      - "4000:44000" # API
      - "3128:43128" # HTTP Proxy
      - "31080:41080" # SOCKS5 Proxy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s

  edge_admin_a2:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin_a2
    networks:
      - local_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.20.0.101"
      - "edge-vpn-broker.localtest.me:172.20.0.101"
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
      edge_admin_a1:
        condition: service_healthy
    volumes:
      - ../../edge_admin:/app:z
      - ../../nexmaker:/nexmaker:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_a2_build:/app/_build
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    environment:
      - AUTH_ENABLED=false
    ports:
      - "4001:44000" # API
      - "3129:43128" # HTTP Proxy
      - "1081:41080" # SOCKS5 Proxy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s

  edge_admin_b1:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin_b1
    networks:
      - local_edge_core
    extra_hosts:
      - "edge-vpn.localtest.me:172.20.0.101"
      - "edge-vpn-broker.localtest.me:172.20.0.101"
    depends_on:
      edge_vpn:
        condition: service_healthy
      edge_admin_db:
        condition: service_healthy
      edge_admin_a1:
        condition: service_healthy
    volumes:
      - ../../edge_admin:/app:z
      - ../../nexmaker:/nexmaker:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_b1_build:/app/_build
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./.envs/.edge_admin
    environment:
      - ADMIN_CLUSTER_NAME=b
      - ADMIN_CLUSTER_SUBNET=100.63.1.0/24
    ports:
      - "4002:44000" # API
      - "3130:43128" # HTTP Proxy
      - "1082:41080" # SOCKS5 Proxy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44000/health"]
      interval: 60s
      timeout: 5s
      retries: 6
      start_period: 45s

  edge_admin_test:
    build:
      context: ../..
      dockerfile: ./deploy/local/compose/edge_admin/Dockerfile
    image: local_edge_admin
    container_name: local_edge_admin_test
    networks:
      - local_edge_core
    depends_on:
      edge_admin_db:
        condition: service_healthy
    volumes:
      - ../../edge_admin:/app:z
      - ../../nexmaker:/nexmaker:z
      - local_edge_admin_deps:/app/deps
      - local_edge_admin_a1_build:/app/_build
    env_file:
      - ./.envs/.edge_admin_test
    profiles:
      - test
    command: mix test

  # Edge VPN Stack
  edge_vpn_db:
    image: postgres:18
    container_name: local_edge_vpn_db
    networks:
      - local_edge_core
    volumes:
      - local_edge_vpn_db_data:/var/lib/postgresql
    env_file:
      - ./.envs/.edge_vpn_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge_vpn_broker:
    image: emqx/emqx:5.8.9
    container_name: local_edge_vpn_broker
    networks:
      local_edge_core:
        aliases:
          - edge-vpn-broker-1.edge
    ports:
      - "48083:8083"
      - "48085:18083"
    volumes:
      - local_edge_vpn_broker_data:/opt/emqx/data
      - local_edge_vpn_broker_etc:/opt/emqx/etc
      - local_edge_vpn_broker_logs:/opt/emqx/log
      - ../../deploy/production/compose/edge_vpn_broker/emqx.conf:/opt/emqx/data/configs/cluster.hocon
    env_file:
      - ./.envs/.edge_vpn_broker
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  edge_vpn:
    image: gravitl/netmaker:v1.5.1
    container_name: local_edge_vpn
    networks:
      - local_edge_core
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - local_edge_vpn_data:/root/data
      - local_edge_vpn_dns_config:/root/config/dnsconfig
      - /dev/net/tun:/dev/net/tun:rw
    env_file:
      - ./.envs/.edge_vpn
    ports:
      - "48081:8081"
    depends_on:
      edge_vpn_db:
        condition: service_healthy
      edge_vpn_broker:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8081/api/server/status",
        ]
      interval: 10s
      timeout: 5s
      retries: 1
      start_period: 10s

  edge_vpn_dns:
    image: coredns/coredns:latest
    container_name: local_edge_vpn_dns
    user: "0:0"
    networks:
      - local_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    volumes:
      - local_edge_vpn_dns_config:/root/config/dnsconfig
    command: -conf /root/config/dnsconfig/Corefile

  edge_vpn_ui:
    container_name: local_edge_vpn_ui
    image: gravitl/netmaker-ui:v1.5.1
    networks:
      - local_edge_core
    depends_on:
      edge_vpn:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://edge-vpn.localtest.me
    ports:
      - "48080:80"

  # HTTP Reverse Proxy
  edge_http_proxy:
    image: caddy:alpine
    container_name: local_edge_http_proxy
    networks:
      local_edge_core:
        ipv4_address: 172.20.0.101
        aliases:
          - edge-vpn.localtest.me
          - edge-vpn-broker.localtest.me
          - edge-admin.localtest.me
    ports:
      - "80:80"
    volumes:
      - ./compose/edge_http_proxy/Caddyfile:/etc/caddy/Caddyfile
      - local_edge_http_proxy_data:/data
      - local_edge_http_proxy_config:/config
    depends_on:
      - edge_vpn
    command: caddy run --config /etc/caddy/Caddyfile

  # TCP Forward Proxy Load Balancer
  edge_tcp_proxy:
    image: haproxy:latest
    container_name: local_edge_tcp_proxy
    networks:
      - local_edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
      edge_admin_a2:
        condition: service_healthy
      edge_admin_b1:
        condition: service_healthy
    volumes:
      - ./compose/edge_tcp_proxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "53128:43128" # HTTP forward proxy
      - "51080:41080" # SOCKS5 proxy

  # DERP Relay Server
  edge_relay:
    build:
      context: ../..
      dockerfile: ./deploy/production/compose/edge_relay/Dockerfile
    image: local_edge_relay
    container_name: local_edge_relay
    networks:
      - local_edge_core
    volumes:
      - local_edge_relay_data:/var/lib/derper
    env_file:
      - ./.envs/.edge_relay
    ports:
      - "43340:3340" # DERP (dev mode, plain HTTP)
      - "43478:3478/udp" # STUN
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3340/derp/probe"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # DERP Map Server
  edge_relay_map:
    image: caddy:alpine
    container_name: local_edge_relay_map
    networks:
      - local_edge_core
    volumes:
      - local_edge_relay_map_data:/data
      - ./compose/edge_relay_map/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./compose/edge_relay_map/derp-map.json:/srv/derp-map.json:ro
    ports:
      - "47713:47713" # Edge relay map (plain HTTP, dev mode)
    command: caddy run --config /etc/caddy/Caddyfile
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:47713/derpmap/default"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Metrics
  edge_metrics_storage:
    image: victoriametrics/victoria-metrics:latest
    container_name: local_edge_metrics_storage
    networks:
      - local_edge_core
    depends_on:
      edge_admin_a1:
        condition: service_healthy
    ports:
      - "8428:8428"
    volumes:
      - local_edge_metrics_storage_data:/storage
    env_file:
      - ./.envs/.edge_metrics_storage
    command:
      - "-envflag.enable"
      - "-envflag.prefix=VM_"

  edge_metrics_collector:
    image: victoriametrics/vmagent:latest
    container_name: local_edge_metrics_collector
    networks:
      - local_edge_core
    depends_on:
      edge_metrics_storage:
        condition: service_started
    volumes:
      - ../../deploy/production/compose/edge_metrics_collector/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    env_file:
      - ./.envs/.edge_metrics_collector
    ports:
      - "8429:8429"
    command:
      - "-envflag.enable"
      - "-envflag.prefix=VM_"

  # Event Broker
  edge_event_broker_nats:
    image: nats:alpine
    container_name: local_edge_event_broker_nats
    networks:
      - local_edge_core
    volumes:
      - local_edge_event_broker_nats_data:/data
      - ../../deploy/production/compose/edge_event_broker/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz?js-enabled-only=true | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "44222:4222"   # NATS client
      - "48222:8222"   # NATS monitoring
    command: ["-c", "/etc/nats/nats.conf"]

  edge_event_broker_nats_ui:
    image: ghcr.io/nats-nui/nui:latest
    container_name: local_edge_event_broker_nats_ui
    networks:
      - local_edge_core
    volumes:
      - local_edge_event_broker_nui_data:/db
      - ../../deploy/production/compose/edge_event_broker/nui-context.json:/clicontexts/edge-event-broker.json:ro
    depends_on:
      edge_event_broker_nats:
        condition: service_healthy
    ports:
      - "41311:31311"   # NUI web UI
    command:
      - --db-path=/db/nui.db
      - --nats-cli-contexts=/clicontexts

