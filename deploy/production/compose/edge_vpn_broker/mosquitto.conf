# deploy/production/compose/edge_vpn_broker/mosquitto.conf

# Global security settings (applies to all listeners)
allow_anonymous true

# WebSocket listener on port 8083
listener 8083
protocol websockets

# Raw MQTT listener on localhost only — used exclusively for Docker healthcheck
listener 1883 127.0.0.1
protocol mqtt

# Reduce log noise
connection_messages false
log_type error
log_type warning
