# deploy/production/compose/edge_vpn_broker/emqx.conf
#
# EMQX configuration for Edge VPN mesh.
# Mounted into the container at: /opt/emqx/data/configs/cluster.hocon
#
# Auth/ACL is managed dynamically by the VPN server at startup via EMQX REST API.
# Cluster discovery and node identity are driven by environment variables
# in .envs/.edge_vpn_broker — not this file.

authentication = [
  {
    backend = "built_in_database"
    mechanism = "password_based"
    password_hash_algorithm {
      name = "sha256"
      salt_position = "suffix"
    }
    user_id_type = "username"
  }
]

authorization {
  deny_action = ignore
  no_match = allow
  sources = []
}
