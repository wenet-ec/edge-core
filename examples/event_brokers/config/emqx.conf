# examples/event_brokers/config/emqx.conf
# EMQX 5.x HOCON config. Mounted at /opt/emqx/data/configs/cluster.hocon.

log {
  console {
    enable = true
    level = warning
  }
}

# Cluster — single node by default, ready to scale to N. Add more seeds and
# spin up sibling containers with matching node names to form a cluster.
# autoheal (default true) resolves split-brain automatically; autoclean removes
# nodes that have been gone for >24h so the cluster doesn't accumulate ghosts.
cluster {
  name = edge_event_broker
  discovery_strategy = static
  static.seeds = ["emqx@edge_event_broker"]
  autoheal = true
  autoclean = 24h
}

# MQTT protocol limits — apply to the publish path. Generous defaults; tune per deployment.
mqtt {
  max_packet_size = 1MB         # CloudEvents envelope is small (<5KB); 1MB leaves headroom
  max_clientid_len = 65535
  max_topic_levels = 128
  max_qos_allowed = 2
  retain_available = true       # broker accepts retained messages — subscribers decide whether to use
  wildcard_subscription = true
  shared_subscription = true
  keepalive_multiplier = 1.5
  session_expiry_interval = 2h  # MQTT 5 default — clients override per-session via CONNECT
  max_inflight = 32
  max_awaiting_rel = 100
}

# Authentication: anonymous (no auth chain configured).
# Authorization: allow-all.
# Intentional for the default deployment — access is controlled at the network
# level (Docker network + firewall). For internet-exposed deployments, configure
# a real auth source (built_in_database, http, jwt, etc.) and lock down authz.
authorization {
  no_match = allow
  deny_action = ignore
  sources = []
}

# Listeners — TCP + WebSocket on standard ports. SSL/WSS commented; uncomment
# when exposing publicly and mount certs at /etc/mqtt/tls/.
listeners {
  tcp.default {
    bind = "0.0.0.0:1883"
    max_connections = 10000
  }
  ws.default {
    bind = "0.0.0.0:8083"
    max_connections = 10000
    websocket.mqtt_path = "/mqtt"
  }

  # ssl.default {
  #   bind = "0.0.0.0:8883"
  #   max_connections = 10000
  #   ssl_options {
  #     certfile   = "/etc/mqtt/tls/server.crt"
  #     keyfile    = "/etc/mqtt/tls/server.key"
  #     cacertfile = "/etc/mqtt/tls/ca.crt"
  #     verify     = verify_none   # set to verify_peer for mTLS
  #   }
  # }
  # wss.default {
